name: Continuous Integration & Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Dependency Cache

      - name: Install dependencies
        run: npm ci

      - name: Verify Build
        run: npm run build

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
        if: always()

      - name: Run E2E Tests (Playwright)
        run: |
          npm run start:api &
          npm run dev &
          npx wait-on http://localhost:5173 http://localhost:3000/api/auth/me || sleep 10
          npx playwright test
        if: always()

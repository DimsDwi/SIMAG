<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — SIMAG</title>
  <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323800" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar" style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" class="brand-font" style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span style="color:#818cf8">.</span></a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div id="admin-initials" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"><span class="simag-user-initials"></span></div>
      <div style="overflow:hidden;">
        <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name"><span class="simag-user-name"></span></p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Admin</p>
      </div>
    </div>
    <nav>
      <p style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">Menu</p>
      <div class="sidebar-item active" onclick="window.location.href='dashboard-admin.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='approval-pendaftaran.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Approve Pendaftaran
      </div>
      <div class="sidebar-item" onclick="window.location.href='konversi-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Konversi SKS
        <span id="admin-sks-pending-badge" class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingSks"></span></span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='laporan-admin.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analitik &amp; Laporan
      </div>
      <div class="sidebar-item" onclick="window.location.href='riwayat-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Riwayat SKS
      </div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-admin.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          Pengaturan
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <!-- Loading State -->
    <div v-if="loading" class="simag-loading-screen" style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(99,102,241,0.2);border-top-color:#818cf8;animation:spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:14px;">Memuat dashboard...</p>
    </div>

    <template v-else>
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;">
      <div>
        <h1 class="brand-font" style="font-size:32px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px;background:linear-gradient(135deg, #fff 0%, #a5b4fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Panel Admin &amp; Dosen</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.5);font-weight:500;">Program Studi Informatika — S1 <span style="margin:0 8px;color:rgba(255,255,255,0.2);">•</span> Semester Genap 2024/2025</p>
      </div>
      <button type="button" onclick="window.location.href='laporan-admin.html'" class="btn-primary" style="padding:10px 22px;border-radius:10px;font-size:14px;color:#fff;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:0 4px 12px rgba(79,70,229,0.3);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Ekspor Laporan
      </button>
    </div>

    <!-- Alert -->
    <div style="background:linear-gradient(135deg, rgba(99,102,241,0.1), rgba(168,85,247,0.05));border:1px solid rgba(139,92,246,0.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:32px;box-shadow:0 8px 20px rgba(0,0,0,0.1);position:relative;overflow:hidden;">
      <div style="position:absolute;top:0;left:0;bottom:0;width:4px;background:linear-gradient(180deg, #6366f1, #a855f7);"></div>
      <div style="width:40px;height:40px;border-radius:10px;background:rgba(139,92,246,0.2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </div>
      <div style="flex:1;">
        <p style="font-size:15px;font-weight:600;color:#c084fc;display:flex;align-items:center;gap:8px;">
          <span>{{ pendingApplications.length }} Pendaftaran Magang Menunggu Approval</span>
          <span v-if="pendingApplications.length > 0" style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:0 0 8px #ef4444;animation:pulse 2s infinite;"></span>
        </p>
        <p style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px;">
          <span>{{ pendingApplications.length ? 'Setelah disetujui, mahasiswa otomatis muncul pada dashboard Mitra dan Dosen.' : 'Semua pendaftaran magang sudah selesai diproses.' }}</span>
        </p>
      </div>
      <button onclick="window.location.href='approval-pendaftaran.html'" class="btn-primary" style="margin-left:auto;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:600;color:#fff;flex-shrink:0;">Review Sekarang</button>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:32px;" class="dashboard-stats">
      <div class="glass-card" style="border-radius:16px;padding:24px;position:relative;overflow:hidden;border-top:1px solid rgba(129,140,248,0.3);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <p style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);">Total Mahasiswa Aktif</p>
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
        </div>
        <p style="font-size:36px;font-family:var(--heading-font);font-weight:800;background:linear-gradient(135deg, #818cf8, #a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">{{ stats.activeStudents }}</p>
        <p style="font-size:12px;color:#4ade80;margin-top:8px;font-weight:600;display:flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> 12 dari bulan lalu</p>
      </div>
      <div class="glass-card" style="border-radius:16px;padding:24px;position:relative;overflow:hidden;border-top:1px solid rgba(34,211,238,0.3);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <p style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);">Perusahaan Mitra</p>
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(34,211,238,0.15);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg></div>
        </div>
        <p style="font-size:36px;font-family:var(--heading-font);font-weight:800;background:linear-gradient(135deg, #22d3ee, #38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">{{ stats.companyCount }}</p>
        <p style="font-size:12px;color:#4ade80;margin-top:8px;font-weight:600;display:flex;align-items:center;gap:4px;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg> 8 baru bulan ini</p>
      </div>
      <div class="glass-card" style="border-radius:16px;padding:24px;position:relative;overflow:hidden;border-top:1px solid rgba(74,222,128,0.3);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <p style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);">Total SKS Terkonversi</p>
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(74,222,128,0.15);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4ade80" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></div>
        </div>
        <p style="font-size:36px;font-family:var(--heading-font);font-weight:800;background:linear-gradient(135deg, #4ade80, #10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">{{ stats.totalSks }}</p>
        <p style="font-size:12px;color:transparent;margin-top:8px;user-select:none;">&nbsp;</p>
      </div>
      <div class="glass-card" style="border-radius:16px;padding:24px;position:relative;overflow:hidden;border-top:1px solid rgba(251,191,36,0.3);">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
          <p style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);">Avg. Kepuasan</p>
          <div style="width:32px;height:32px;border-radius:8px;background:rgba(251,191,36,0.15);display:flex;align-items:center;justify-content:center;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fbbf24" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div>
        </div>
        <p style="font-size:36px;font-family:var(--heading-font);font-weight:800;background:linear-gradient(135deg, #fbbf24, #f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">{{ stats.scoreAverage }}%</p>
        <p style="font-size:12px;color:transparent;margin-top:8px;user-select:none;">&nbsp;</p>
      </div>
    </div>

    <!-- Bottom Cards -->
    <div class="dashboard-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">
      <!-- Recent Activity -->
      <div class="glass-card" style="border-radius:16px;padding:28px;min-height:360px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h3 style="font-size:18px;font-weight:700;color:#fff;">Aktivitas Terbaru</h3>
        </div>
          <div v-if="!activities.length" style="padding:24px;text-align:center;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);border-radius:12px;color:rgba(255,255,255,0.4);font-size:13px;">
            <div style="width:48px;height:48px;margin:0 auto 12px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            </div>
            Belum ada aktivitas terbaru.
          </div>
          <div v-else style="display:flex;flex-direction:column;gap:16px;">
            <div v-for="act in activities.slice(0,5)" :key="act.id" style="display:flex;gap:14px;align-items:center;padding:12px;border-radius:12px;transition:background 0.2s;cursor:default;" onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background='transparent'">
              <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg, rgba(99,102,241,0.15), rgba(168,85,247,0.15));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;">{{ act.icon }}</div>
              <div style="flex:1;">
                <p style="font-size:14px;font-weight:600;color:#f1f5f9;">{{ act.title }}</p>
                <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px;">{{ act.meta }}</p>
              </div>
            </div>
          </div>
      </div>

      <!-- Pending Approvals -->
      <div class="glass-card" style="border-radius:16px;padding:28px;min-height:360px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
          <h3 style="font-size:18px;font-weight:700;color:#fff;">Pending Approval</h3>
        </div>
          <div v-if="!pendingApplications.length" style="padding:24px;text-align:center;color:rgba(255,255,255,0.4);font-size:13px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.1);border-radius:12px;">
            <div style="width:48px;height:48px;margin:0 auto 12px;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            </div>
            Tidak ada approval pending.
          </div>
          <div v-else style="display:flex;flex-direction:column;gap:12px;">
            <div v-for="app in pendingApplications.slice(0,4)" :key="app.id" style="display:flex;align-items:center;gap:14px;padding:12px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);border-radius:12px;transition:all 0.2s;" onmouseover="this.style.borderColor='rgba(99,102,241,0.3)';this.style.transform='translateY(-2px)'" onmouseout="this.style.borderColor='rgba(255,255,255,0.05)';this.style.transform='translateY(0)'">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;box-shadow:0 4px 10px rgba(99,102,241,0.3);">{{ getInitials(app.name || 'SM') }}</div>
              <div style="flex:1;min-width:0;">
                <p style="font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ app.name || 'Mahasiswa' }}</p>
                <p style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ app.companyName || '-' }} <span style="margin:0 4px;">•</span> {{ app.position || 'Magang' }}</p>
              </div>
              <button @click="approveApplication(app.id)" class="btn-primary" style="padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;">Approve</button>
            </div>
          </div>
          <button v-if="pendingApplications.length > 0" onclick="window.location.href='approval-pendaftaran.html'" style="width:100%;margin-top:16px;padding:12px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.7);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.05)';this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.02)';this.style.color='rgba(255,255,255,0.7)'">Lihat Semua Approval →</button>
      </div>
    </div>

    <!-- Connection Grid -->
    <div class="glass-card" style="border-radius:16px;padding:28px;margin-top:24px;min-height:220px;position:relative;overflow:hidden;">
      <!-- decorative blur -->
      <div style="position:absolute;top:-50px;right:-50px;width:150px;height:150px;background:rgba(99,102,241,0.15);filter:blur(60px);border-radius:50%;pointer-events:none;"></div>
      
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap;position:relative;z-index:1;">
        <div>
          <h3 style="font-size:18px;font-weight:700;margin-bottom:6px;color:#fff;">Koneksi Antar Dashboard</h3>
          <p style="font-size:13px;color:rgba(255,255,255,0.5);">Data approval, logbook, nilai, and SKS tersinkron ke semua role secara real-time.</p>
        </div>
        <span class="badge badge-success" style="padding:6px 12px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:6px;"><span style="width:6px;height:6px;background:#4ade80;border-radius:50%;display:inline-block;animation:pulse 2s infinite;"></span> {{ connectionSummary }}</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;position:relative;z-index:1;">
        <div v-for="card in connectionCards" :key="card.role" style="padding:20px;border-radius:14px;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.05);display:flex;flex-direction:column;gap:14px;transition:all 0.3s;cursor:pointer;position:relative;overflow:hidden;" onmouseover="this.style.transform='translateY(-4px)';this.style.borderColor='rgba(255,255,255,0.15)';this.style.background='rgba(255,255,255,0.02)'" onmouseout="this.style.transform='translateY(0)';this.style.borderColor='rgba(255,255,255,0.05)';this.style.background='rgba(0,0,0,0.2)'">
          <div :style="{ position:'absolute', top:0, left:0, right:0, height:'3px', background: card.color, opacity:0.8 }"></div>
          <div>
            <p style="font-size:13px;font-weight:500;color:rgba(255,255,255,0.5);margin-bottom:8px;display:flex;align-items:center;gap:6px;">
              <span :style="{ display:'inline-block', width:'8px', height:'8px', borderRadius:'50%', background: card.color }"></span>
              {{ card.title }}
            </p>
            <strong style="font-size:26px;font-family:var(--heading-font);font-weight:700;" :style="{ color: card.color }">{{ card.value }}</strong>
            <p style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:6px;line-height:1.5;">{{ card.copy }}</p>
          </div>
          <button type="button" @click.stop="openDashboard(card.role, card.page)" class="btn-outline" style="margin-top:auto;padding:10px 14px;border-radius:10px;color:#fff;font-size:13px;font-weight:500;width:100%;">{{ card.button }}</button>
        </div>
      </div>
    </div>
      </template>
  </main>
</div>

<style>
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.2); } }
</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('adminprodi');

const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    return {
      loading: true,
      userName: user ? user.name : '...',
      pendingApplications: [],
      pendingSks: 0,
      activities: [],
      stats: { activeStudents: 0, companyCount: 0, totalSks: 0, scoreAverage: 0 },
      connectionCards: [],
      connectionSummary: 'Sinkron'
    };
  },
  computed: {
    initials() {
      return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'AP';
    }
  },
  methods: {
    getInitials(name) {
      return (name||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'SM';
    },
    openDashboard(role, page) {
      const session = simag_getSession();
      if (session.token && session.role === role) { window.location.href = page; return; }
      simag_setPostLoginRedirect(role, `pages/${page}`);
      window.location.href = `../login.html?role=${encodeURIComponent(role)}`;
    },
    async approveApplication(id) {
      await SIMAG_DATA.approveApplication(id);
      await this.loadData();
    },
    async loadData() {
      try {
        const data = await SIMAG_DATA.getDashboardSummaryAdmin().catch(() => null);
        if (!data) return;

        this.pendingApplications = data.pendingApplications || [];
        this.pendingSks = data.pendingSks || 0;
        this.activities = data.activities || [];
        this.stats = data.stats || { activeStudents: 0, companyCount: 0, totalSks: 0, scoreAverage: 0 };
        this.connectionSummary = data.connectionSummary || 'Sinkron';
        
        const ps = data.primarySks || { sks: 0, target: 20 };
        const pip = data.primaryInternProgress !== null ? `${data.primaryInternProgress}% progress magang` : 'Belum ada magang aktif';
        
        this.connectionCards = [
          { role:'adminprodi', page:'laporan-admin.html', title:'Admin Prodi', value:`${data.pendingApprovalCount || 0} approval`, copy:`${this.pendingSks} mahasiswa perlu cek SKS`, color:'#fbbf24', button:'Buka laporan' },
          { role:'mahasiswa', page:'dashboard-mahasiswa.html', title:'Mahasiswa', value:`${ps.sks}/${ps.target} SKS`, copy: pip, color:'#818cf8', button:'Lihat dashboard' },
          { role:'mitra', page:'dashboard-mitra.html', title:'Mitra', value:`${data.internCount || 0} intern`, copy:`${data.activeVacancyCount || 0} lowongan aktif`, color:'#22d3ee', button:'Cek mitra' },
          { role:'dospem', page:'dashboard-dospem.html', title:'Dosen Pembimbing', value:`${data.reviewLogbookCount || 0} review`, copy:`${data.waitingEval || 0} penilaian menunggu`, color:'#a855f7', button:'Pantau bimbingan' }
        ];
      } catch(e) {
        console.error("Gagal memuat data:", e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

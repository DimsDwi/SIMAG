<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Admin — SIMAG</title>
  <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323800" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar" style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" class="brand-font" style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span style="color:#818cf8">.</span></a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div id="admin-initials" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"><span class="simag-user-initials"></span></div>
      <div style="overflow:hidden;">
        <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name"><span class="simag-user-name"></span></p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Admin</p>
      </div>
    </div>
    <nav>
      <p style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">Menu</p>
      <div class="sidebar-item active" onclick="window.location.href='dashboard-admin.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='approval-pendaftaran.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Approve Pendaftaran
      </div>
      <div class="sidebar-item" onclick="window.location.href='konversi-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Konversi SKS
        <span id="admin-sks-pending-badge" class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingSks"></span></span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='laporan-admin.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Analitik &amp; Laporan
      </div>
      <div class="sidebar-item" onclick="window.location.href='riwayat-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
        Riwayat SKS
      </div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-admin.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          Pengaturan
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <!-- Loading State -->
    <div v-if="loading" class="simag-loading-screen" style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(99,102,241,0.2);border-top-color:#818cf8;animation:spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:14px;">Memuat dashboard...</p>
    </div>

    <template v-else>
    <!-- Loading -->
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px;">Panel Admin &amp; Dosen</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Program Studi Informatika — S1 • Semester Genap 2024/2025</p>
      </div>
      <button type="button" onclick="window.location.href='laporan-admin.html'" class="btn-primary" style="padding:10px 20px;border-radius:9px;font-size:13px;color:#fff;font-weight:600;">Ekspor Laporan</button>
    </div>

    <!-- Alert -->
    <div style="background:rgba(99,102,241,0.08);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:12px;margin-bottom:24px;min-height:74px;">
      <div style="flex:1;">
        <p style="font-size:14px;font-weight:500;color:#818cf8;">
          <span>{{ pendingApplications.length }} Pendaftaran Magang Menunggu Approval</span>
        </p>
        <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:2px;">
          <span>{{ pendingApplications.length ? 'Setelah disetujui, mahasiswa otomatis muncul pada dashboard Mitra dan Dosen.' : 'Semua pendaftaran magang sudah selesai diproses.' }}</span>
        </p>
      </div>
      <button onclick="window.location.href='approval-pendaftaran.html'" class="btn-primary" style="margin-left:auto;padding:8px 14px;border-radius:8px;font-size:12px;color:#fff;flex-shrink:0;">Review Sekarang</button>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;" class="dashboard-stats">
      <div class="glass-card" style="border-radius:12px;padding:20px;min-height:114px;">
        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Total Mahasiswa Aktif</p>
        <p style="font-size:28px;font-weight:700;color:#818cf8;">{{ stats.activeStudents }}</p>
        <p style="font-size:11px;color:#4ade80;margin-top:4px;">↑ 12 dari bulan lalu</p>
      </div>
      <div class="glass-card" style="border-radius:12px;padding:20px;min-height:114px;">
        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Perusahaan Mitra</p>
        <p style="font-size:28px;font-weight:700;color:#22d3ee;">{{ stats.companyCount }}</p>
        <p style="font-size:11px;color:#4ade80;margin-top:4px;">↑ 8 baru bulan ini</p>
      </div>
      <div class="glass-card" style="border-radius:12px;padding:20px;min-height:114px;">
        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Total SKS Terkonversi</p>
        <p style="font-size:28px;font-weight:700;color:#4ade80;">{{ stats.totalSks }}</p>
        <p style="font-size:11px;color:transparent;margin-top:4px;">&nbsp;</p>
      </div>
      <div class="glass-card" style="border-radius:12px;padding:20px;min-height:114px;">
        <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Avg. Kepuasan</p>
        <p style="font-size:28px;font-weight:700;color:#fbbf24;">{{ stats.scoreAverage }}%</p>
        <p style="font-size:11px;color:transparent;margin-top:4px;">&nbsp;</p>
      </div>
    </div>

    <!-- Bottom Cards -->
    <div class="dashboard-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <!-- Recent Activity -->
      <div class="glass-card" style="border-radius:14px;padding:24px;min-height:340px;">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">Aktivitas Terbaru</h3>
        <template>
          <div v-if="!activities.length" style="padding:18px;background:rgba(255,255,255,0.03);border-radius:10px;color:rgba(255,255,255,0.45);font-size:13px;">Belum ada aktivitas terbaru.</div>
          <div v-else style="display:flex;flex-direction:column;gap:12px;">
            <div v-for="act in activities.slice(0,5)" :key="act.id" style="display:flex;gap:10px;align-items:flex-start;">
              <div style="width:32px;height:32px;border-radius:8px;background:rgba(99,102,241,0.15);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">{{ act.icon }}</div>
              <div>
                <p style="font-size:13px;font-weight:500;">{{ act.title }}</p>
                <p style="font-size:11px;color:rgba(255,255,255,0.35);">{{ act.meta }}</p>
              </div>
            </div>
          </div>
        </template>
      </div>

      <!-- Pending Approvals -->
      <div class="glass-card" style="border-radius:14px;padding:24px;min-height:340px;">
        <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;">Pending Approval</h3>
        <template>
          <div v-if="!pendingApplications.length" style="padding:18px;text-align:center;color:rgba(255,255,255,0.4);font-size:13px;background:rgba(255,255,255,0.03);border-radius:8px;">Tidak ada approval pending.</div>
          <div v-else style="display:flex;flex-direction:column;gap:8px;">
            <div v-for="app in pendingApplications.slice(0,3)" :key="app.id" style="display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.03);border-radius:8px;">
              <div style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;">{{ getInitials(app.name || 'SM') }}</div>
              <div style="flex:1;min-width:0;">
                <p style="font-size:13px;font-weight:500;">{{ app.name || 'Mahasiswa' }}</p>
                <p style="font-size:11px;color:rgba(255,255,255,0.35);">{{ app.companyName || '-' }} - {{ app.position || 'Magang' }}</p>
              </div>
              <button @click="approveApplication(app.id)" style="padding:5px 10px;border-radius:6px;background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.3);color:#4ade80;font-size:11px;cursor:pointer;">Approve</button>
            </div>
          </div>
          <button onclick="window.location.href='approval-pendaftaran.html'" style="width:100%;margin-top:14px;padding:10px;background:none;border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:rgba(255,255,255,0.4);font-size:12px;cursor:pointer;">Lihat Semua →</button>
        </template>
      </div>
    </div>

    <!-- Connection Grid -->
    <div class="glass-card" style="border-radius:14px;padding:24px;margin-top:20px;min-height:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
        <div>
          <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;">Koneksi Antar Dashboard</h3>
          <p style="font-size:12px;color:rgba(255,255,255,0.45);">Data approval, logbook, nilai, and SKS tersinkron ke semua role.</p>
        </div>
        <span class="badge badge-info">{{ connectionSummary }}</span>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;">
        <div v-for="card in connectionCards" :key="card.role" style="padding:16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:12px;">
          <div>
            <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:6px;">{{ card.title }}</p>
            <strong style="font-size:22px;" :style="{ color: card.color }">{{ card.value }}</strong>
            <p style="font-size:12px;color:rgba(255,255,255,0.42);margin-top:6px;line-height:1.5;">{{ card.copy }}</p>
          </div>
          <button type="button" @click="openDashboard(card.role, card.page)" class="btn-outline" style="margin-top:auto;padding:8px 10px;border-radius:8px;color:#fff;font-size:12px;">{{ card.button }}</button>
        </div>
      </div>
    </div>
      </template>
  </main>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('adminprodi');

const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    return {
      loading: true,
      userName: user ? user.name : '...',
      pendingApplications: [],
      pendingSks: 0,
      activities: [],
      stats: { activeStudents: 0, companyCount: 0, totalSks: 0, scoreAverage: 0 },
      connectionCards: [],
      connectionSummary: 'Sinkron'
    };
  },
  computed: {
    initials() {
      return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'AP';
    }
  },
  methods: {
    getInitials(name) {
      return (name||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'SM';
    },
    openDashboard(role, page) {
      const session = simag_getSession();
      if (session.token && session.role === role) { window.location.href = page; return; }
      simag_setPostLoginRedirect(role, `pages/${page}`);
      window.location.href = `../login.html?role=${encodeURIComponent(role)}`;
    },
    async approveApplication(id) {
      await SIMAG_DATA.approveApplication(id);
      await this.loadData();
    },
    async loadData() {
      try {
        const data = await SIMAG_DATA.getDashboardSummaryAdmin().catch(() => null);
        if (!data) return;

        this.pendingApplications = data.pendingApplications || [];
        this.pendingSks = data.pendingSks || 0;
        this.activities = data.activities || [];
        this.stats = data.stats || { activeStudents: 0, companyCount: 0, totalSks: 0, scoreAverage: 0 };
        this.connectionSummary = data.connectionSummary || 'Sinkron';
        
        const ps = data.primarySks || { sks: 0, target: 20 };
        const pip = data.primaryInternProgress !== null ? `${data.primaryInternProgress}% progress magang` : 'Belum ada magang aktif';
        
        this.connectionCards = [
          { role:'adminprodi', page:'laporan-admin.html', title:'Admin Prodi', value:`${data.pendingApprovalCount || 0} approval`, copy:`${this.pendingSks} mahasiswa perlu cek SKS`, color:'#fbbf24', button:'Buka laporan' },
          { role:'mahasiswa', page:'dashboard-mahasiswa.html', title:'Mahasiswa', value:`${ps.sks}/${ps.target} SKS`, copy: pip, color:'#818cf8', button:'Lihat dashboard' },
          { role:'mitra', page:'dashboard-mitra.html', title:'Mitra', value:`${data.internCount || 0} intern`, copy:`${data.activeVacancyCount || 0} lowongan aktif`, color:'#22d3ee', button:'Cek mitra' },
          { role:'dospem', page:'dashboard-dospem.html', title:'Dosen Pembimbing', value:`${data.reviewLogbookCount || 0} review`, copy:`${data.waitingEval || 0} penilaian menunggu`, color:'#a855f7', button:'Pantau bimbingan' }
        ];
      } catch(e) {
        console.error("Gagal memuat data:", e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

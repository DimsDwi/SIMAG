<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intern Aktif — SIMAG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    @media (max-width: 768px) {
      aside { display: none; }
      main { padding:20px !important; }
      .intern-header { align-items:flex-start !important; flex-direction:column; }
      .intern-controls { width:100%; flex-direction:column; }
      .intern-controls input, .intern-controls select { width:100% !important; }
    }
  </style>
</head>
<body>

<div style="display:flex;min-height:100vh;">

  <!-- ── Sidebar ────────────────────────────────────────────── -->
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">◈ SIMAG</a>
    </div>

    <!-- Company Info -->
    <div style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">BM</div>
      <div style="overflow:hidden;">
        <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name">PT. Bank Mandiri</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
      </div>
    </div>

    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item active" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Intern Aktif
        <span class="badge badge-info" style="margin-left:auto;">12</span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Monitoring Logbook
        <span class="badge badge-warning" style="margin-left:auto;">5</span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Lowongan Aktif
      </div>
      <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Laporan
      </div>

      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Pengaturan Profil
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main style="flex:1;padding:32px;overflow-x:hidden;">

    <div class="intern-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:18px;">
      <div>
        <h1 style="font-size:24px;font-weight:700;margin-bottom:4px;">Intern Aktif</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Daftar mahasiswa yang sedang melaksanakan magang di perusahaan Anda.</p>
      </div>
      <div class="intern-controls" style="display:flex;gap:10px;">
        <input id="intern-search" type="search" oninput="renderInterns()" placeholder="Cari nama atau posisi..." style="width:220px;padding:10px 16px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:13px;">
        <select id="intern-status-filter" onchange="renderInterns()" class="form-input" style="width:150px;padding:10px 12px;font-size:13px;">
          <option value="">Semua Status</option>
          <option value="Accepted">Accepted</option>
          <option value="Aktif">Aktif</option>
          <option value="Perlu Review">Perlu Review</option>
        </select>
      </div>
    </div>

    <div class="glass-card" style="border-radius:14px;padding:24px;">
      <p id="intern-count" style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;"></p>
      <div style="overflow-x:auto;">
        <table style="width:100%;min-width:680px;text-align:left;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Nama & Institusi</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Posisi</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Progress</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Status</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Aksi</th>
            </tr>
          </thead>
          <tbody id="intern-table-body"></tbody>
        </table>
      </div>
    </div>

</main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/mitra-data.js"></script>
<script>
  simag_requireAuth('mitra');

  const { user } = simag_getSession();
  if (user) {
    document.getElementById('sidebar-name').textContent = user.name;
  }

  function renderInterns() {
    const keyword = document.getElementById('intern-search').value.trim().toLowerCase();
    const statusFilter = document.getElementById('intern-status-filter').value;
    const sksConversions = SIMAG_DATA.getSksConversions();
    const interns = SIMAG_MITRA.getInterns().filter((intern) => {
      const matchesKeyword = `${intern.name} ${intern.position} ${intern.institution}`
        .toLowerCase()
        .includes(keyword);
      const matchesStatus = !statusFilter || intern.status === statusFilter;
      return matchesKeyword && matchesStatus;
    });

    const tableBody = document.getElementById('intern-table-body');
    tableBody.innerHTML = '';
    document.getElementById('intern-count').textContent =
      `Menampilkan ${interns.length} dari ${SIMAG_MITRA.getInterns().length} intern`;

    if (interns.length === 0) {
      tableBody.innerHTML = '<tr><td colspan="5" style="padding:30px;text-align:center;color:rgba(255,255,255,0.4);">Intern tidak ditemukan.</td></tr>';
      return;
    }

    interns.forEach((intern) => {
      const sks = sksConversions.find((item) => item.studentId === intern.id) || { sks: 0, status: 'Pending' };
      const row = document.createElement('tr');
      row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
      const statusClass = ['Aktif', 'Accepted'].includes(intern.status) ? 'badge-success' : 'badge-warning';
      row.innerHTML = `
        <td style="padding:12px;">
          <div style="display:flex;align-items:center;gap:12px;">
            <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">${intern.initials}</div>
            <div>
              <p style="font-size:13px;font-weight:600;">${intern.name}</p>
              <p style="font-size:11px;color:rgba(255,255,255,0.4);">${intern.institution}</p>
            </div>
          </div>
        </td>
        <td style="padding:12px;font-size:13px;">${intern.position}</td>
        <td style="padding:12px;">
          <div style="display:flex;align-items:center;gap:8px;">
            <div class="progress-bar" style="width:80px;height:6px;"><div class="progress-fill" style="width:${intern.progress}%;background:#22d3ee;"></div></div>
            <span style="font-size:12px;color:rgba(255,255,255,0.6);">${intern.progress}%</span>
          </div>
        </td>
        <td style="padding:12px;"><span class="badge ${statusClass}">${intern.status}</span><span class="badge ${sks.status === 'Completed' ? 'badge-success' : 'badge-warning'}" style="margin-left:6px;">${sks.sks} SKS ${sks.status}</span></td>
        <td style="padding:12px;">
          <button type="button" data-intern-id="${intern.id}" style="padding:6px 12px;border-radius:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:11px;cursor:pointer;">Lihat Detail</button>
        </td>
      `;
      row.querySelector('button').onclick = () => {
        window.location.href = `detail-intern.html?intern=${encodeURIComponent(intern.id)}`;
      };
      tableBody.appendChild(row);
    });
  }

  renderInterns();
</script>
</body>
</html>

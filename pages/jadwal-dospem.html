<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jadwal Bimbingan - SIMAG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
<div style="display:flex;min-height:100vh;">
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;"><a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">SIMAG</a></div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div id="lecturer-initials" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#d946ef);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">AF</div>
      <div style="overflow:hidden;"><p id="sidebar-name" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Dr. Ahmad Fauzi</p><p style="font-size:11px;color:rgba(255,255,255,0.4);">Dosen Pembimbing</p></div>
    </div>
    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-dospem.html'" style="cursor:pointer;">Dashboard</div>
      <div class="sidebar-item" onclick="window.location.href='mahasiswa-bimbingan.html'" style="cursor:pointer;">Mahasiswa Bimbingan</div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook-dospem.html'" style="cursor:pointer;">Review Logbook</div>
      <div class="sidebar-item" onclick="window.location.href='penilaian-dospem.html'" style="cursor:pointer;">Penilaian &amp; Evaluasi</div>
      <div class="sidebar-item active" onclick="window.location.href='jadwal-dospem.html'" style="cursor:pointer;">Jadwal Bimbingan</div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-dospem.html'" style="cursor:pointer;">Pengaturan</div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">Keluar</div>
      </div>
    </nav>
  </aside>

  <main style="flex:1;padding:32px;overflow-x:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">Jadwal Bimbingan</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Atur agenda bimbingan mahasiswa dan pantau pertemuan terdekat.</p>
      </div>
    </div>

    <div class="dashboard-two-col" style="display:grid;grid-template-columns:360px 1fr;gap:20px;align-items:start;">
      <form class="glass-card" onsubmit="saveSchedule(event)" style="padding:24px;border-radius:14px;">
        <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;">Tambah Jadwal</h2>
        <div style="display:flex;flex-direction:column;gap:14px;">
          <div>
            <label for="schedule-student" class="form-label">Mahasiswa</label>
            <select id="schedule-student" class="form-input" required></select>
          </div>
          <div>
            <label for="schedule-date" class="form-label">Tanggal</label>
            <input id="schedule-date" type="date" class="form-input" required />
          </div>
          <div>
            <label for="schedule-time" class="form-label">Jam</label>
            <input id="schedule-time" type="time" class="form-input" required />
          </div>
          <div>
            <label for="schedule-topic" class="form-label">Agenda</label>
            <input id="schedule-topic" class="form-input" required maxlength="120" placeholder="Review progress mingguan" />
          </div>
          <button type="submit" class="btn-primary" style="padding:10px 18px;border-radius:9px;color:#fff;font-weight:600;">Simpan Jadwal</button>
        </div>
      </form>

      <section class="glass-card" style="padding:24px;border-radius:14px;">
        <h2 style="font-size:16px;font-weight:700;margin-bottom:16px;">Agenda Bimbingan</h2>
        <div id="schedule-list" style="display:flex;flex-direction:column;gap:12px;"></div>
      </section>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/mitra-data.js"></script>
<script>
  simag_requireAuth('dospem');

  const SCHEDULE_KEY = 'simag_dospem_schedules_v1';

  function readSchedules() {
    try {
      const saved = JSON.parse(localStorage.getItem(SCHEDULE_KEY) || '[]');
      return Array.isArray(saved) ? saved : [];
    } catch (error) {
      localStorage.removeItem(SCHEDULE_KEY);
      return [];
    }
  }

  function writeSchedules(items) {
    localStorage.setItem(SCHEDULE_KEY, JSON.stringify(items));
  }

  function defaultSchedules(data) {
    return data.interns.map((intern, index) => ({
      id: `default-${intern.id}`,
      studentId: intern.id,
      studentName: intern.name,
      date: index === 0 ? '2026-06-22' : '2026-06-24',
      time: index === 0 ? '10:00' : '13:30',
      topic: `Bimbingan progress ${intern.logbookWeek}`
    }));
  }

  function formatScheduleDate(value) {
    return new Intl.DateTimeFormat('id-ID', {
      weekday: 'long',
      day: 'numeric',
      month: 'long',
      year: 'numeric'
    }).format(new Date(`${value}T00:00:00`));
  }

  function renderSchedulePage() {
    const data = SIMAG_DATA.getData();
    document.getElementById('sidebar-name').textContent = data.people.lecturer.name;
    document.getElementById('lecturer-initials').textContent = data.people.lecturer.initials || 'DP';

    const select = document.getElementById('schedule-student');
    select.innerHTML = data.interns.map((intern) => `<option value="${simag_escapeHtml(intern.id)}">${simag_escapeHtml(intern.name)}</option>`).join('');

    const schedules = [...readSchedules(), ...defaultSchedules(data)]
      .sort((a, b) => `${a.date}T${a.time}`.localeCompare(`${b.date}T${b.time}`));
    const list = document.getElementById('schedule-list');
    list.innerHTML = '';
    schedules.forEach((schedule) => {
      const item = document.createElement('div');
      item.style.cssText = 'display:flex;justify-content:space-between;gap:16px;align-items:flex-start;padding:14px;border-radius:10px;background:rgba(255,255,255,0.03);border-left:4px solid #a855f7;';
      item.innerHTML = `<div><p style="font-size:14px;font-weight:700;">${simag_escapeHtml(schedule.topic)}</p><p style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:4px;">${simag_escapeHtml(schedule.studentName)} - ${formatScheduleDate(schedule.date)}</p></div><span class="badge badge-info">${simag_escapeHtml(schedule.time)} WIB</span>`;
      list.appendChild(item);
    });
  }

  function saveSchedule(event) {
    event.preventDefault();
    const data = SIMAG_DATA.getData();
    const studentId = document.getElementById('schedule-student').value;
    const intern = data.interns.find((item) => item.id === studentId) || data.interns[0];
    const schedules = readSchedules();
    schedules.unshift({
      id: `schedule-${Date.now()}`,
      studentId,
      studentName: intern.name,
      date: document.getElementById('schedule-date').value,
      time: document.getElementById('schedule-time').value,
      topic: document.getElementById('schedule-topic').value.trim()
    });
    writeSchedules(schedules);
    event.target.reset();
    renderSchedulePage();
  }

  renderSchedulePage();
</script>
</body>
</html>

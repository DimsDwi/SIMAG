<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lowongan Aktif — SIMAG</title>
  
  
  
    <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323816" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    @media (max-width: 768px) {
      /* aside display removed for mobile drawer */
      main { padding:20px !important; }
      .vacancy-header { align-items:flex-start !important; flex-direction:column; }
      #vacancy-grid { grid-template-columns:1fr !important; }
    }
  </style>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar"
      style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
      <div style="margin-bottom:28px;padding:0 8px;">
        <a href="../index.html" class="brand-font"
          style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span
            style="color:#818cf8">.</span></a>
      </div>
      <div
        style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
        <div id="sidebar-initials"
          style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">
          <span class="simag-user-initials"></span></div>
        <div style="overflow:hidden;">
          <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
            id="sidebar-name"><span class="simag-user-name"></span></p>
          <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
        </div>
      </div>
      <nav>
        <p
          style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">
          Menu</p>
        <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </div>
        <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          Intern Aktif
          <span class="badge badge-info" style="margin-left:auto;"><span class="simag-badge-value" data-key="internCount"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          Monitoring Logbook
          <span class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingLogbooks"></span></span>
        </div>
        <div class="sidebar-item active" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
          Lowongan Aktif
        </div>
        <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Laporan
        </div>
        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
          <div class="sidebar-item" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
            </svg>
            Pengaturan Profil
          </div>
          <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Keluar
          </div>
        </div>
      </nav>
    </aside>

  <!-- Main -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <div class="vacancy-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;">
      <div>
        <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;">Lowongan Aktif</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Kelola publikasi lowongan magang untuk perusahaan Anda.</p>
      </div>
      <button type="button" class="btn-primary" onclick="window.location.href='lowongan-baru.html'" style="padding:10px 20px;border-radius:9px;font-size:13px;color:#fff;font-weight:600;">+ Buat Lowongan Baru</button>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="padding:60px;text-align:center;">
      <div style="width:36px;height:36px;border-radius:50%;border:3px solid rgba(34,211,238,0.2);border-top-color:#22d3ee;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;">Memuat lowongan...</p>
    </div>

    <template v-else>
      <div style="margin-bottom:14px;color:rgba(255,255,255,0.4);font-size:12px;">{{ activeCount }} lowongan aktif dari {{ vacancies.length }} lowongan</div>
      
      <div v-if="!vacancies.length" class="glass-card" style="padding:32px;border-radius:12px;text-align:center;color:rgba(255,255,255,0.4);">
        Belum ada lowongan.
      </div>
      
      <div v-else id="vacancy-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <article v-for="vacancy in vacancies" :key="vacancy.id" class="glass-card" :style="{ padding:'24px', borderRadius:'12px', opacity: vacancy.status === 'active' ? '1' : '0.7' }">
          <div style="display:flex;justify-content:space-between;gap:16px;margin-bottom:16px;">
            <h3 style="font-size:18px;font-weight:600;">{{ vacancy.title }}</h3>
            <span class="badge" :class="vacancy.status === 'active' ? 'badge-success' : 'badge-warning'">{{ vacancy.status === 'active' ? 'Terpublikasi' : 'Ditutup' }}</span>
          </div>
          <p style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:16px;">{{ vacancy.location }} ({{ vacancy.workModel }}) • Kuota: {{ vacancy.quota }} Orang</p>
          
          <div style="background:rgba(255,255,255,0.03);padding:12px;border-radius:8px;margin-bottom:16px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
              <span style="font-size:12px;color:rgba(255,255,255,0.5);">Pelamar</span>
              <span style="font-size:14px;font-weight:700;color:#22d3ee;">{{ getApplicantCount(vacancy.id) }} Orang</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span style="font-size:12px;color:rgba(255,255,255,0.5);">Batas Waktu</span>
              <span style="font-size:12px;color:#fbbf24;">{{ formatDeadline(vacancy.deadline) }}</span>
            </div>
          </div>
          
          <div style="display:flex;gap:12px;">
            <button @click="goApplicants(vacancy.id)" type="button" style="flex:1;padding:8px;border-radius:8px;background:rgba(255,255,255,0.1);color:#fff;font-size:12px;cursor:pointer;border:none;">Lihat Pelamar</button>
            <button @click="toggleStatus(vacancy)" type="button" style="flex:1;padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;font-size:12px;cursor:pointer;">
              {{ vacancy.status === 'active' ? 'Tutup Lowongan' : 'Buka Kembali' }}
            </button>
          </div>
        </article>
      </div>
    </template>
  </main>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('mitra');
const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    return {
      loading: true, userName: user ? user.name : '...',
      vacancies: [], applicants: []
    };
  },
  computed: {
    initials() { return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'BM'; },
    activeCount() { return this.vacancies.filter(v => v.status === 'active').length; }
  },
  methods: {
    formatDeadline(v) { try { return new Intl.DateTimeFormat('id-ID',{day:'numeric',month:'long',year:'numeric'}).format(new Date(`${v}T00:00:00`)); } catch { return v||'-'; } },
    getApplicantCount(id) { return this.applicants.filter(a => a.vacancyId === id).length; },
    goApplicants(id) { window.location.href = `pelamar-lowongan.html?vacancy=${encodeURIComponent(id)}`; },
    async toggleStatus(vacancy) {
      const isActive = vacancy.status === 'active';
      const action = isActive ? 'menutup' : 'membuka kembali';
      if (!window.confirm(`Yakin ingin ${action} lowongan ini?`)) return;
      await SIMAG_MITRA.updateVacancy(vacancy.id, { status: isActive ? 'closed' : 'active' });
      await this.loadData();
    },
    async loadData() {
      try {
        this.vacancies = await SIMAG_MITRA.getVacancies().catch(() => []);
        this.applicants = await SIMAG_MITRA.getApplicants().catch(() => []);
      } catch (e) {
        console.error('Gagal memuat data:', e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

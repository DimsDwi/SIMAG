  </style>
  <style>[v-cloak] { display: none !important; }</style>

<body>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">

    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar"
      style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
      <div style="margin-bottom:28px;padding:0 8px;">
        <a href="../index.html" class="brand-font"
          style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span
            style="color:#818cf8">.</span></a>
      </div>
      <div
        style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
        <div id="sidebar-initials"
          style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">
          <span class="simag-user-initials"></span></div>
        <div style="overflow:hidden;">
          <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
            id="sidebar-name"><span class="simag-user-name"></span></p>
          <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
        </div>
      </div>
      <nav>
        <p
          style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">
          Menu</p>
        <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </div>
        <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          Intern Aktif
          <span class="badge badge-info" style="margin-left:auto;"><span class="simag-badge-value" data-key="internCount"></span></span>
        </div>
        <div class="sidebar-item active" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          Monitoring Logbook
          <span class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingLogbooks"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
          Lowongan Aktif
        </div>
        <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Laporan
        </div>
        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
          <div class="sidebar-item" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
            </svg>
            Pengaturan Profil
          </div>
          <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Keluar
          </div>
        </div>
      </nav>
    </aside>

  <!-- Main -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <div class="review-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:18px;">
      <div>
        <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;">Monitoring Logbook Mahasiswa</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Pantau laporan harian mahasiswa magang. Approval dan revisi dilakukan oleh dosen pembimbing.</p>
      </div>
      <div class="review-controls" style="display:flex;gap:10px;">
        <input v-model="searchQuery" type="search" class="form-input" placeholder="Cari mahasiswa..." style="width:200px;padding:9px 12px;font-size:13px;">
        <select v-model="statusFilter" class="form-input" style="width:170px;padding:9px 12px;font-size:13px;">
          <option value="submitted">Submitted</option>
          <option value="">Semua Status</option>
          <option value="approved">Disetujui</option>
          <option value="revision">Perlu Revisi</option>
        </select>
      </div>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="padding:60px;text-align:center;">
      <div style="width:36px;height:36px;border-radius:50%;border:3px solid rgba(34,211,238,0.2);border-top-color:#22d3ee;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;">Memuat data logbook...</p>
    </div>

    <template v-else>
      <div style="margin-bottom:14px;color:rgba(255,255,255,0.4);font-size:12px;">Menampilkan {{ filteredLogbooks.length }} dari {{ logbooks.length }} logbook</div>
      
      <div v-if="!filteredLogbooks.length" class="glass-card" style="padding:32px;border-radius:12px;text-align:center;color:rgba(255,255,255,0.4);">
        Tidak ada logbook yang sesuai filter.
      </div>

      <div v-else style="display:flex;flex-direction:column;gap:16px;">
        <article v-for="lb in filteredLogbooks" :key="lb.id" class="glass-card" :style="{ padding:'20px', borderRadius:'12px', borderLeft: `4px solid ${getStatusMeta(lb.status).color}` }">
          <div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;margin-bottom:12px;">
            <div>
              <h3 style="font-size:16px;font-weight:600;">{{ getIntern(lb.internId).name }} ({{ getIntern(lb.internId).position }})</h3>
              <p style="font-size:12px;color:rgba(255,255,255,0.5);">{{ formatDate(lb.date) }}</p>
            </div>
            <span class="badge" :class="getStatusMeta(lb.status).badge">{{ getStatusMeta(lb.status).label }}</span>
          </div>
          <h4 style="font-size:13px;color:#fff;margin-bottom:7px;">{{ lb.activity }}</h4>
          <p style="font-size:14px;line-height:1.6;margin-bottom:12px;background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;">{{ lb.description }}</p>
          <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:16px;"><strong style="color:rgba(255,255,255,0.65);">Hasil:</strong> {{ lb.result }}</p>
          <p v-if="lb.note" style="font-size:12px;color:#a5b4fc;margin-bottom:16px;"><strong>Catatan:</strong> {{ lb.note }}</p>
          
          <div class="review-actions" style="display:flex;gap:12px;">
            <button @click="goLogbook(lb.id)" type="button" style="padding:8px 16px;border-radius:8px;background:rgba(129,140,248,0.15);border:1px solid rgba(129,140,248,0.3);color:#c4b5fd;font-size:13px;cursor:pointer;font-weight:600;">Lihat Detail</button>
            <button @click="goIntern(lb.internId)" type="button" style="padding:8px 16px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:13px;cursor:pointer;">Detail Mahasiswa</button>
          </div>
        </article>
      </div>
    </template>
  </main>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('mitra');
const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    const params = new URLSearchParams(window.location.search);
    return {
      loading: true, userName: user ? user.name : '...',
      interns: [], logbooks: [],
      searchQuery: '', statusFilter: 'submitted', selectedIntern: params.get('intern')
    };
  },
  computed: {
    initials() { return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'BM'; },
    filteredLogbooks() {
      const q = this.searchQuery.toLowerCase();
      return this.logbooks.filter(lb => {
        const i = this.getIntern(lb.internId);
        const matchQ = i && `${i.name} ${i.position} ${lb.activity}`.toLowerCase().includes(q);
        const matchS = !this.statusFilter || lb.status === this.statusFilter;
        const matchI = !this.selectedIntern || lb.internId === this.selectedIntern;
        return matchQ && matchS && matchI;
      });
    }
  },
  methods: {
    getIntern(id) { return this.interns.find(i => i.id === id) || {}; },
    getStatusMeta(status) {
      const m = {
        pending: { label: 'Menunggu Review', badge: 'badge-warning', color: '#fbbf24' },
        submitted: { label: 'Submitted', badge: 'badge-info', color: '#818cf8' },
        approved: { label: 'Disetujui', badge: 'badge-success', color: '#4ade80' },
        revision: { label: 'Perlu Revisi', badge: 'badge-warning', color: '#fbbf24' }
      };
      return m[status] || m.pending;
    },
    formatDate(v) { try { return new Intl.DateTimeFormat('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}).format(new Date(`${v}T00:00:00`)); } catch { return v||'-'; } },
    goLogbook(id) { window.location.href = `detail-logbook.html?id=${encodeURIComponent(id)}&role=mitra`; },
    goIntern(id) { window.location.href = `detail-intern.html?intern=${encodeURIComponent(id)}`; },
    async loadData() {
      try {
        this.interns = await SIMAG_MITRA.getInterns().catch(() => []);
        this.logbooks = await SIMAG_MITRA.getLogbooks().catch(() => []);
      } catch (e) {
        console.error('Gagal memuat data:', e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

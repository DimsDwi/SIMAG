<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Isi Logbook Baru — SIMAG</title>
  
  
  
    <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323810" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    textarea.form-input { min-height: 120px; resize: vertical; }
    input[type="date"], input[type="time"] { color-scheme: dark; }
    @media (max-width: 768px) {
      /* aside display removed for mobile drawer */
      main { padding: 20px !important; }
      .form-grid { grid-template-columns: 1fr !important; }
      .form-card { padding: 22px !important; }
    }
  </style>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <aside id="simag-sidebar" style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" class="brand-font" style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span style="color:#818cf8">.</span></a>
    </div>

    <div style="display:flex;align-items:center;gap:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"><span class="simag-user-initials"></span></div>
      <div style="overflow:hidden;">
        <p style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"><span class="simag-user-name"></span></p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Mahasiswa • S1 IF</p>
      </div>
    </div>

    <nav>
      <p style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">Menu</p>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mahasiswa.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='cari-lowongan.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Cari Lowongan
      </div>
      <div class="sidebar-item active" onclick="window.location.href='logbook-saya.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Logbook Saya
      </div>
      <div class="sidebar-item" onclick="window.location.href='progress-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Progress SKS
      </div>
      <div class="sidebar-item" onclick="window.location.href='jadwal.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2h-19A1.5 1.5 0 0 0 1 3.5v17A1.5 1.5 0 0 0 2.5 22h19a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 21.5 2zM1 8h22"/></svg>
        Jadwal
      </div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <div style="max-width:880px;">
      <a href="logbook-saya.html" style="display:inline-flex;align-items:center;gap:7px;margin-bottom:22px;color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;">
        <span aria-hidden="true">←</span> Kembali ke Logbook Saya
      </a>

      <div style="margin-bottom:28px;">
        <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:6px;">Isi Logbook Baru</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Catat kegiatan, hasil pekerjaan, dan kendala selama magang.</p>
      </div>

      <div class="glass-card form-card" style="padding:32px;border-radius:16px;">
        <form @submit.prevent="saveLogbook">
          <div class="form-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;margin-bottom:20px;">
            <div>
              <label for="tanggal" class="form-label">Tanggal Kegiatan</label>
              <input type="date" id="tanggal" v-model="form.date" :max="maxDate" class="form-input" required />
            </div>
            <div>
              <label for="waktu-mulai" class="form-label">Waktu Mulai</label>
              <input type="time" id="waktu-mulai" v-model="form.startTime" class="form-input" required />
            </div>
            <div>
              <label for="waktu-selesai" class="form-label">Waktu Selesai</label>
              <input type="time" id="waktu-selesai" v-model="form.endTime" class="form-input" required />
            </div>
          </div>

          <div style="margin-bottom:20px;">
            <label for="kegiatan" class="form-label">Kegiatan yang Dilakukan</label>
            <textarea id="kegiatan" v-model="form.activity" class="form-input" required maxlength="1000" placeholder="Contoh: Melakukan slicing halaman dashboard dan mengintegrasikan data dari API..."></textarea>
            <p style="margin-top:6px;color:rgba(255,255,255,0.3);font-size:11px;">Jelaskan aktivitas secara ringkas dan jelas.</p>
          </div>

          <div style="margin-bottom:20px;">
            <label for="hasil" class="form-label">Hasil atau Capaian</label>
            <textarea id="hasil" v-model="form.result" class="form-input" required maxlength="1000" placeholder="Tuliskan hasil pekerjaan yang berhasil diselesaikan..."></textarea>
          </div>

          <div style="margin-bottom:26px;">
            <label for="kendala" class="form-label">Kendala dan Solusi <span style="color:rgba(255,255,255,0.3);">(Opsional)</span></label>
            <textarea id="kendala" v-model="form.obstacle" class="form-input" maxlength="1000" placeholder="Tuliskan kendala yang ditemui dan cara mengatasinya..."></textarea>
          </div>

          <div v-if="errorMsg" style="margin-bottom:18px;padding:12px 14px;border-radius:9px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);color:#fca5a5;font-size:13px;">
            {{ errorMsg }}
          </div>

          <div style="display:flex;justify-content:flex-end;gap:12px;flex-wrap:wrap;">
            <button type="button" onclick="window.location.href='logbook-saya.html'" class="btn-outline" style="padding:10px 20px;border-radius:9px;color:#fff;font-size:13px;cursor:pointer;">Batal</button>
            <button type="submit" class="btn-primary" style="padding:10px 24px;border-radius:9px;color:#fff;font-size:13px;font-weight:600;border:none;cursor:pointer;" :disabled="submitting">{{ submitting ? 'Menyimpan...' : 'Kirim Logbook' }}</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('mahasiswa');
const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    const today = new Date();
    const localDate = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
    return {
      userName: user ? user.name : '...',
      maxDate: localDate,
      form: { date: localDate, startTime: '', endTime: '', activity: '', result: '', obstacle: '' },
      errorMsg: '',
      submitting: false
    };
  },
  computed: {
    initials() { return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'M'; }
  },
  methods: {
    async saveLogbook() {
      this.errorMsg = '';
      if (this.form.endTime <= this.form.startTime) {
        this.errorMsg = 'Waktu selesai harus lebih akhir dari waktu mulai.';
        return;
      }
      this.submitting = true;
      try {
        await SIMAG_DATA.addLogbook({
          date: this.form.date,
          startTime: this.form.startTime,
          endTime: this.form.endTime,
          title: this.form.activity.trim(),
          description: this.form.activity.trim(),
          result: this.form.result.trim(),
          obstacle: this.form.obstacle.trim()
        });
        window.location.href = 'logbook-saya.html?created=1';
      } catch (error) {
        this.errorMsg = 'Terjadi kesalahan saat menyimpan logbook.';
        this.submitting = false;
      }
    }
  }
}).mount('#app');
</script>
</body>
</html>

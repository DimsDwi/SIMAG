<head>
  <meta charset="UTF-8" />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323817" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar"
      style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
      <div style="margin-bottom:28px;padding:0 8px;">
        <a href="../index.html" class="brand-font"
          style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span
            style="color:#818cf8">.</span></a>
      </div>
      <div
        style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
        <div id="sidebar-initials"
          style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">
          <span class="simag-user-initials"></span></div>
        <div style="overflow:hidden;">
          <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
            id="sidebar-name"><span class="simag-user-name"></span></p>
          <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
        </div>
      </div>
      <nav>
        <p
          style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">
          Menu</p>
        <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </div>
        <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          Intern Aktif
          <span class="badge badge-info" style="margin-left:auto;"><span class="simag-badge-value" data-key="internCount"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          Monitoring Logbook
          <span class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingLogbooks"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
          Lowongan Aktif
        </div>
        <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Laporan
        </div>
        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
          <div class="sidebar-item" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
            </svg>
            Pengaturan Profil
          </div>
          <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Keluar
          </div>
        </div>
      </nav>
    </aside>

  <!-- Main Section -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <div style="margin-bottom:20px;">
      <a href="lowongan-aktif.html" style="color:rgba(255,255,255,0.45); text-decoration:none; font-size:13px; display:inline-flex; align-items:center; gap:6px;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Kembali ke Lowongan Aktif
      </a>
    </div>

    <div style="margin-bottom:28px;">
      <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;">Buat Lowongan Baru</h1>
      <p style="font-size:14px;color:rgba(255,255,255,0.45);">Publikasikan posisi magang baru untuk menjaring mahasiswa terbaik.</p>
    </div>

    <!-- Form Card -->
    <div class="glass-card" style="max-width:800px; padding:32px; border-radius:16px;">
      <form @submit.prevent="handleCreateLowongan">
        <div style="margin-bottom:20px;">
          <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Nama Posisi / Judul Lowongan</label>
          <input type="text" v-model="form.title" class="form-input" required placeholder="Contoh: Frontend Developer Intern" style="width:100%;" />
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
          <div>
            <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Model Kerja</label>
            <select v-model="form.workModel" class="form-input" required style="width:100%; background:#111; color:#fff; border:1px solid rgba(255,255,255,0.1);">
              <option value="WFO">WFO (Work From Office)</option>
              <option value="WFH">WFH (Work From Home)</option>
              <option value="Hybrid">Hybrid</option>
            </select>
          </div>
          <div>
            <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Lokasi Penempatan</label>
            <input type="text" v-model="form.location" class="form-input" required placeholder="Contoh: Jakarta Pusat / Yogyakarta" style="width:100%;" />
          </div>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px;">
          <div>
            <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Jumlah Kuota (Orang)</label>
            <input type="number" v-model="form.quota" class="form-input" required min="1" placeholder="Contoh: 3" style="width:100%;" />
          </div>
          <div>
            <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Batas Waktu Pendaftaran</label>
            <input type="date" v-model="form.deadline" :min="minDate" class="form-input" required style="width:100%; color-scheme: dark;" />
          </div>
        </div>

        <div style="margin-bottom:20px;">
          <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Deskripsi Pekerjaan</label>
          <textarea v-model="form.description" class="form-input" required rows="4" placeholder="Jelaskan mengenai tugas dan tanggung jawab posisi ini..." style="width:100%; height:auto; padding:12px;  resize:vertical;"></textarea>
        </div>

        <div style="margin-bottom:28px;">
          <label class="form-label" style="display:block; margin-bottom:8px; font-size:13px; font-weight:500; color:rgba(255,255,255,0.7);">Kualifikasi Pelamar</label>
          <textarea v-model="form.qualifications" class="form-input" required rows="4" placeholder="Contoh:&#10;- Mahasiswa ... semester 5 keatas&#10;- Memahami JavaScript / React&#10;- Mampu bekerja dalam tim" style="width:100%; height:auto; padding:12px;  resize:vertical;"></textarea>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:12px;">
          <button type="button" onclick="window.location.href='lowongan-aktif.html'" style="padding:10px 20px; border-radius:9px; font-size:13px; background:transparent; border:1px solid rgba(255,255,255,0.15); color:#fff; cursor:pointer; ">Batal</button>
          <button type="submit" class="btn-primary" style="padding:10px 24px; border-radius:9px; font-size:13px; color:#fff;  font-weight:600; cursor:pointer;" :disabled="submitting">{{ submitting ? 'Menyimpan...' : 'Publish Lowongan' }}</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('mitra');
const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    const today = new Date();
    const localDate = new Date(today.getTime() - today.getTimezoneOffset() * 60000).toISOString().slice(0, 10);
    return {
      userName: user ? user.name : '...',
      minDate: localDate,
      form: { title: '', workModel: 'WFO', location: '', quota: '', deadline: '', description: '', qualifications: '' },
      submitting: false
    };
  },
  computed: {
    initials() { return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'BM'; }
  },
  methods: {
    async handleCreateLowongan() {
      this.submitting = true;
      try {
        const title = this.form.title.trim();
        await SIMAG_MITRA.addVacancy({
          id: `${title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '')}-${Date.now()}`,
          title,
          workModel: this.form.workModel,
          location: this.form.location.trim(),
          quota: this.form.quota,
          deadline: this.form.deadline,
          description: this.form.description.trim(),
          qualifications: this.form.qualifications.trim()
        });
        alert('Sukses! Lowongan magang baru berhasil dipublikasikan.');
        window.location.href = 'lowongan-aktif.html';
      } catch (error) {
        alert('Gagal membuat lowongan.');
        this.submitting = false;
      }
    }
  }
}).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Detail Intern — SIMAG</title>
  
  
  
    <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323804" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <div style="margin-bottom:24px;display:flex;align-items:center;gap:12px;">
      <button type="button" @click="goBack" style="padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:13px;cursor:pointer;">
        ← Kembali
      </button>
      <span style="color:rgba(255,255,255,0.4);font-size:13px;">{{ breadcrumbText }}</span>
    </div>

    <!-- Loading -->
    <div v-if="loading" style="padding:60px;text-align:center;">
      <div style="width:36px;height:36px;border-radius:50%;border:3px solid rgba(34,211,238,0.2);border-top-color:#22d3ee;animation:spin 0.8s linear infinite;margin:0 auto 12px;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:13px;">Memuat data mahasiswa...</p>
    </div>

    <template v-else-if="intern">
      <div class="glass-card" style="border-radius:14px;padding:32px;margin-bottom:24px;display:flex;gap:24px;align-items:center;flex-wrap:wrap;">
        <div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;">{{ intern.initials }}</div>
        <div style="flex:1;min-width:250px;">
          <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:4px;">{{ intern.name }}</h1>
          <p style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:12px;">{{ intern.nim || '...' }} — {{ intern.university || 'Universitas Amikom Yogyakarta' }}</p>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <span class="badge" style="background:rgba(34,211,238,0.1);color:#22d3ee;padding:4px 10px;border-radius:6px;font-size:11px;">{{ intern.position }}</span>
            <span class="badge" :style="{ background: isActive(intern.status) ? 'rgba(74,222,128,0.1)' : 'rgba(251,191,36,0.12)', color: isActive(intern.status) ? '#4ade80' : '#fbbf24', padding:'4px 10px', borderRadius:'6px', fontSize:'11px' }">{{ intern.status }}</span>
          </div>
        </div>
        <div style="background:rgba(0,0,0,0.2);padding:16px 24px;border-radius:12px;text-align:center;min-width:150px;">
          <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Progress Magang</p>
          <p style="font-size:32px;font-weight:700;color:#22d3ee;">{{ intern.progress }}%</p>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:24px;">
        <div class="glass-card" style="border-radius:14px;padding:24px;">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:12px;">Informasi Magang</h3>
          <ul style="list-style:none;padding:0;margin:0;font-size:13px;">
            <li style="display:flex;justify-content:space-between;margin-bottom:12px;">
              <span style="color:rgba(255,255,255,0.4);">Periode</span>
              <span>{{ intern.period }}</span>
            </li>
            <li style="display:flex;justify-content:space-between;margin-bottom:12px;">
              <span style="color:rgba(255,255,255,0.4);">Mentor</span>
              <span>{{ intern.mentor || '...' }}</span>
            </li>
            <li style="display:flex;justify-content:space-between;margin-bottom:12px;">
              <span style="color:rgba(255,255,255,0.4);">Kehadiran</span>
              <span>{{ intern.attendance || '0 / 0 Hari' }}</span>
            </li>
          </ul>
        </div>

        <div class="glass-card" style="border-radius:14px;padding:24px;">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:12px;">Status Logbook</h3>
          <div style="display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02);padding:12px;border-radius:8px;margin-bottom:12px;">
            <div>
              <p style="font-size:13px;font-weight:600;">{{ intern.logbookWeek || 'Minggu ke-?' }}</p>
              <p style="font-size:11px;color:rgba(255,255,255,0.4);">{{ logbookStatusText }}</p>
            </div>
            <button @click="goReview" type="button" :disabled="!reviewableLogbook" :style="{ padding:'6px 12px', borderRadius:'6px', background: reviewableLogbook ? '#818cf8' : 'rgba(255,255,255,0.1)', color: reviewableLogbook ? '#fff' : 'rgba(255,255,255,0.5)', border:'none', fontSize:'11px', cursor: reviewableLogbook ? 'pointer' : 'not-allowed' }">
              {{ reviewButtonText }}
            </button>
          </div>
        </div>

        <div class="glass-card" style="border-radius:14px;padding:24px;">
          <h3 style="font-size:16px;font-weight:700;margin-bottom:16px;border-bottom:1px solid rgba(255,255,255,0.05);padding-bottom:12px;">Nilai dan SKS</h3>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
            <div style="padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);">
              <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px;">Nilai Akhir</p>
              <strong style="font-size:24px;color:#4ade80;">{{ evaluation ? evaluation.finalScore : '-' }}</strong>
            </div>
            <div style="padding:12px;border-radius:10px;background:rgba(255,255,255,0.03);">
              <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-bottom:5px;">Konversi SKS</p>
              <strong style="font-size:24px;color:#22d3ee;">{{ sks.sks }} SKS</strong>
            </div>
          </div>
          <button @click="goEvaluate" type="button" class="btn-primary" style="width:100%;padding:9px 14px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;">{{ evaluateButtonText }}</button>
        </div>
      </div>
    </template>
    <div v-else style="padding:60px;text-align:center;color:rgba(255,255,255,0.5);">
      Data mahasiswa tidak ditemukan.
    </div>
  </main>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth(['mitra', 'dospem']);
const { createApp } = Vue;
createApp({
  data() {
    const session = simag_getSession();
    const params = new URLSearchParams(window.location.search);
    return {
      loading: true,
      pageRole: params.get('role') || session.role,
      internId: params.get('intern'),
      intern: null,
      pendingLogbook: null,
      latestLogbook: null,
      evaluation: null,
      sks: { sks: 0, status: 'Pending' }
    };
  },
  computed: {
    breadcrumbText() { return this.pageRole === 'dospem' ? 'Mahasiswa Bimbingan / Detail Mahasiswa' : 'Daftar Intern Aktif / Detail Mahasiswa'; },
    evaluateButtonText() { return this.pageRole === 'dospem' ? 'Beri Nilai Dosen' : 'Beri Nilai Mitra'; },
    logbookStatusText() { return this.latestLogbook ? `${this.latestLogbook.title} - ${SIMAG_DATA.statusLabel(this.latestLogbook.status)}` : 'Belum ada logbook'; },
    reviewableLogbook() { return this.pendingLogbook || this.latestLogbook; },
    reviewButtonText() {
      if (this.pendingLogbook) return 'Review Sekarang';
      if (this.latestLogbook) return 'Lihat Logbook Terbaru';
      return 'Belum Ada Logbook';
    }
  },
  methods: {
    isActive(s) { return ['Aktif', 'Accepted'].includes(s); },
    goBack() { window.location.href = this.pageRole === 'dospem' ? 'mahasiswa-bimbingan.html' : 'intern-aktif.html'; },
    goEvaluate() { if(this.intern) window.location.href = `evaluasi-intern.html?candidate=${encodeURIComponent(this.intern.id)}&role=${encodeURIComponent(this.pageRole)}`; },
    goReview() {
      const lb = this.pendingLogbook || this.latestLogbook;
      if(lb) window.location.href = `detail-logbook.html?id=${encodeURIComponent(lb.id)}&role=${encodeURIComponent(this.pageRole)}`;
    },
    async loadData() {
      try {
        const data = await SIMAG_DATA.getData().catch(() => ({ people: { student: {} } }));
        const id = this.internId || data.people.student.id;
        const interns = await SIMAG_MITRA.getInterns().catch(() => []);
        this.intern = interns.find(i => i.id === id) || interns[0];
        
        if (this.intern) {
          document.title = `${this.intern.name} — Detail Intern SIMAG`;
          this.pendingLogbook = await SIMAG_MITRA.getPendingLogbookForIntern(this.intern.id).catch(() => null);
          this.latestLogbook = await SIMAG_DATA.getLatestLogbookForIntern(this.intern.id).catch(() => null);
          this.evaluation = await SIMAG_MITRA.getEvaluation(this.intern.id).catch(() => null);
          const sksConversions = await SIMAG_DATA.getSksConversions().catch(() => []);
          this.sks = sksConversions.find(s => s.studentId === this.intern.id) || { sks: 0, status: 'Pending' };
        }
      } catch (e) {
        console.error('Gagal memuat data:', e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengaturan Profil — SIMAG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>

<div style="display:flex;min-height:100vh;">

  <!-- ── Sidebar ────────────────────────────────────────────── -->
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">◈ SIMAG</a>
    </div>

    <!-- Company Info -->
    <div style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">BM</div>
      <div style="overflow:hidden;">
        <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name">PT. Bank Mandiri</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
      </div>
    </div>

    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Intern Aktif
        <span class="badge badge-info" style="margin-left:auto;">12</span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Review Logbook
        <span class="badge badge-warning" style="margin-left:auto;">5</span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
        Lowongan Aktif
      </div>
      <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Laporan
      </div>

      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item active" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          Pengaturan Profil
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- ── Main Content ───────────────────────────────────────── -->
  <main style="flex:1;padding:32px;overflow-x:hidden;">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
      <div>
        <h1 style="font-size:24px;font-weight:700;margin-bottom:4px;">Profil Perusahaan</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Kelola detail informasi perusahaan Anda di sistem SIMAG.</p>
      </div>
      <button class="btn-primary" style="padding:10px 20px;border-radius:9px;font-size:13px;color:#fff;font-family:'Syne',sans-serif;font-weight:600;">Simpan Perubahan</button>
    </div>

    <div class="glass-card" style="padding:32px;border-radius:12px;">
      <div style="display:flex;gap:24px;align-items:flex-start;margin-bottom:32px;">
        <div style="width:100px;height:100px;border-radius:16px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;">BM</div>
        <div>
          <h2 style="font-size:20px;font-weight:600;margin-bottom:8px;">PT. Bank Mandiri (Persero) Tbk</h2>
          <p style="color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:12px;">Perbankan & Keuangan Terbesar di Indonesia</p>
          <button style="padding:6px 16px;border-radius:6px;background:rgba(255,255,255,0.1);color:#fff;font-size:12px;border:none;cursor:pointer;">Ubah Logo</button>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;">Email HR / Rekrutmen</label>
          <input type="email" value="hr@bankmandiri.co.id" style="width:100%;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:#fff;" readonly>
        </div>
        <div>
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;">Website Resmi</label>
          <input type="text" value="https://bankmandiri.co.id" style="width:100%;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:#fff;">
        </div>
        <div style="grid-column: span 2;">
          <label style="display:block;font-size:12px;color:rgba(255,255,255,0.5);margin-bottom:6px;">Alamat Kantor Pusat</label>
          <input type="text" value="Plaza Mandiri, Jl. Jend. Gatot Subroto Kav. 36-38, Jakarta 12190" style="width:100%;padding:12px 16px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.1);color:#fff;">
        </div>
      </div>
    </div>

</main>
</div>

<script src="../shared/utils.js"></script>
<script>
  simag_requireAuth('mitra');

  const { user } = simag_getSession();
  if (user) {
    document.getElementById('sidebar-name').textContent = user.name;
  }
</script>
</body>
</html>

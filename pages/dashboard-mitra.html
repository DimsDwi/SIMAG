<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Mitra — SIMAG</title>

  <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323803" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    .mitra-stat-card {
      cursor: pointer;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .mitra-stat-card:hover {
      transform: translateY(-2px);
      border-color: rgba(129, 140, 248, 0.3);
      background: rgba(255, 255, 255, 0.06);
    }

    .intern-row {
      transition: background 0.2s ease;
    }

    .intern-row:hover {
      background: rgba(255, 255, 255, 0.025);
    }

    @media (max-width: 768px) {

      /* aside display removed for mobile drawer */
      main {
        padding: 20px !important;
      }

      .mitra-header {
        align-items: flex-start !important;
        gap: 16px;
        flex-direction: column;
      }

      .intern-table-header {
        align-items: flex-start !important;
        flex-direction: column;
      }

      #search-intern {
        width: 100% !important;
      }
    }
  </style>
  <style>[v-cloak] { display: none !important; }</style>
</head>

<body>

  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
    <button class="simag-mobile-menu-button"
      onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="12" x2="21" y2="12" />
        <line x1="3" y1="6" x2="21" y2="6" />
        <line x1="3" y1="18" x2="21" y2="18" />
      </svg>
    </button>
    <div id="simag-overlay" class="simag-mobile-overlay"
      onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')">
    </div>

    <!-- Sidebar -->
    <aside id="simag-sidebar"
      style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
      <div style="margin-bottom:28px;padding:0 8px;">
        <a href="../index.html" class="brand-font"
          style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span
            style="color:#818cf8">.</span></a>
      </div>
      <div
        style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
        <div id="sidebar-initials"
          style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;">
          <span class="simag-user-initials"></span></div>
        <div style="overflow:hidden;">
          <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"
            id="sidebar-name"><span class="simag-user-name"></span></p>
          <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p>
        </div>
      </div>
      <nav>
        <p
          style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">
          Menu</p>
        <div class="sidebar-item active" onclick="window.location.href='dashboard-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </div>
        <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
          </svg>
          Intern Aktif
          <span class="badge badge-info" style="margin-left:auto;"><span class="simag-badge-value" data-key="internCount"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='review-logbook.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14 2 14 8 20 8" />
          </svg>
          Monitoring Logbook
          <span class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="pendingLogbooks"></span></span>
        </div>
        <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="7" width="20" height="14" rx="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
          Lowongan Aktif
        </div>
        <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
          Laporan
        </div>
        <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
          <div class="sidebar-item" onclick="window.location.href='profil-mitra.html'" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />
            </svg>
            Pengaturan Profil
          </div>
          <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
              <polyline points="16 17 21 12 16 7" />
              <line x1="21" y1="12" x2="9" y2="12" />
            </svg>
            Keluar
          </div>
        </div>
      </nav>
    </aside>

    <!-- Main -->
    <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
      <div v-if="loading"
        style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
        <div
          style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(34,211,238,0.2);border-top-color:#22d3ee;animation:spin 0.8s linear infinite;">
        </div>
        <p style="color:rgba(255,255,255,0.4);font-size:14px;">Memuat dashboard mitra...</p>
      </div>

      <template v-else>
        <!-- Header -->
        <div class="mitra-header"
          style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;">
          <div>
            <h1 class="brand-font text-gradient" style="font-size:28px;font-weight:800;margin-bottom:4px;letter-spacing:-0.5px;">Portal Mitra</h1>
            <p style="font-size:14px;color:rgba(255,255,255,0.45);"><span class="simag-user-name"></span> — Kelola program magang dengan efisien</p>
          </div>
          <button type="button" class="btn-primary" onclick="window.location.href='lowongan-baru.html'"
            style="padding:10px 20px;border-radius:9px;font-size:13px;color:#fff;font-weight:600;">+ Post
            Lowongan</button>
        </div>

        <!-- Stats -->
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;"
          class="dashboard-stats">
          <div class="glass-card mitra-stat-card" @click="goTo('intern-aktif.html')"
            style="border-radius:12px;padding:20px;">
            <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Intern Aktif</p>
            <p style="font-size:28px;font-weight:700;color:#22d3ee;">{{ stats.internCount }}</p>
            <p style="font-size:11px;color:#4ade80;margin-top:4px;">↑ 2 bulan ini</p>
          </div>
          <div class="glass-card mitra-stat-card" @click="goTo('review-logbook.html')"
            style="border-radius:12px;padding:20px;">
            <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Logbook Submitted</p>
            <p style="font-size:28px;font-weight:700;color:#fbbf24;">{{ stats.pendingLogbooks }}</p>
            <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">Monitoring dosen</p>
          </div>
          <div class="glass-card mitra-stat-card" @click="goTo('lowongan-aktif.html')"
            style="border-radius:12px;padding:20px;">
            <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Lowongan Aktif</p>
            <p style="font-size:28px;font-weight:700;color:#818cf8;">{{ stats.activeVacancies }}</p>
            <p style="font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;">{{ stats.applicantCount }} pelamar
              total</p>
          </div>
          <div class="glass-card mitra-stat-card" @click="goTo('intern-aktif.html')"
            style="border-radius:12px;padding:20px;">
            <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:8px;">Avg. Progress Intern</p>
            <p style="font-size:28px;font-weight:700;color:#4ade80;">{{ stats.averageProgress }}%</p>
          </div>
        </div>

        <!-- Intern Table -->
        <div class="glass-card" style="border-radius:14px;padding:24px;">
          <div class="intern-table-header"
            style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:16px;">
            <div>
              <h3 class="brand-font" style="font-size:18px;font-weight:700;color:#fff;">Daftar Intern Aktif</h3>
              <p style="font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">Menampilkan {{
                filteredInterns.length }} mahasiswa</p>
            </div>
            <div style="display:flex;gap:8px;">
              <input v-model="searchQuery" type="search" class="form-input" placeholder="Cari nama atau posisi..."
                style="width:220px;padding:8px 12px;font-size:13px;" />
            </div>
          </div>
          <div style="overflow-x:auto;">
            <table style="width:100%;border-collapse:collapse;font-size:13px;">
              <thead>
                <tr style="border-bottom:1px solid rgba(255,255,255,0.07);">
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Mahasiswa
                  </th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Posisi
                  </th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Progress
                  </th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Logbook
                  </th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Logbook
                    Terbaru</th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Status
                  </th>
                  <th style="text-align:left;padding:10px 12px;color:rgba(255,255,255,0.35);font-weight:500;">Aksi</th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="!filteredInterns.length">
                  <td colspan="7" style="text-align:center;padding:28px;color:rgba(255,255,255,0.4);">Mahasiswa tidak
                    ditemukan.</td>
                </tr>
                <tr v-for="intern in filteredInterns" :key="intern.id" class="intern-row"
                  style="border-bottom:1px solid rgba(255,255,255,0.04);">
                  <td style="padding:12px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <div
                        style="width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;">
                        {{ intern.initials }}</div>
                      {{ intern.name }}
                    </div>
                  </td>
                  <td style="padding:12px;color:rgba(255,255,255,0.6);">{{ intern.position }}</td>
                  <td style="padding:12px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                      <div class="progress-bar" style="width:80px;">
                        <div class="progress-fill" :style="{ width: intern.progress + '%' }"></div>
                      </div>
                      <span style="color:rgba(255,255,255,0.5);">{{ intern.progress }}%</span>
                    </div>
                  </td>
                  <td style="padding:12px;color:rgba(255,255,255,0.6);">{{ intern.logbookCompleted }}/{{
                    intern.logbookTarget }}</td>
                  <td style="padding:12px;min-width:190px;">
                    <div v-if="getLatestLogbook(intern.id)" style="display:flex;flex-direction:column;gap:5px;">
                      <span style="font-size:12px;color:rgba(255,255,255,0.75);">{{ getLatestLogbook(intern.id).title
                        }}</span>
                      <span class="badge" :class="getStatusBadge(getLatestLogbook(intern.id).status)"
                        style="width:max-content;">{{ getStatusLabel(getLatestLogbook(intern.id).status) }}</span>
                    </div>
                    <span v-else style="font-size:12px;color:rgba(255,255,255,0.35);">Belum ada logbook</span>
                  </td>
                  <td style="padding:12px;">
                    <span class="badge"
                      :class="['Aktif','Accepted'].includes(intern.status) ? 'badge-success' : 'badge-warning'">{{
                      intern.status }}</span>
                    <span class="badge"
                      :class="getSks(intern.id).status === 'Completed' ? 'badge-success' : 'badge-warning'"
                      style="margin-left:6px;">{{ getSks(intern.id).sks }} SKS {{ getSks(intern.id).status }}</span>
                  </td>
                  <td style="padding:12px;">
                    <div style="display:flex;gap:8px;flex-wrap:wrap;">
                      <button @click="goDetail(intern.id)"
                        style="font-size:12px;color:#818cf8;background:none;border:none;cursor:pointer;">Detail</button>
                      <button @click="goEvaluate(intern.id)"
                        style="font-size:12px;color:#4ade80;background:none;border:none;cursor:pointer;">Nilai</button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </template>
    </main>
  </div>

  <style>
    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
  <script src="../shared/utils.js"></script>
  <script src="../shared/api-client.js"></script>
  <script>
    'use strict';
    simag_requireAuth('mitra');
    const { createApp } = Vue;
    createApp({
      data() {
        const { user } = simag_getSession();
        return {
          loading: true, userName: user ? user.name : '...',
          interns: [], logbooks: [], sksConversions: [], searchQuery: '',
          stats: { internCount: 0, pendingLogbooks: 0, activeVacancies: 0, applicantCount: 0, averageProgress: 0 }
        };
      },
      computed: {
        initials() { return (this.userName || '').split(' ').filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join('') || 'BM'; },
        filteredInterns() {
          const q = this.searchQuery.toLowerCase();
          return this.interns.filter(i => `${i.name} ${i.position}`.toLowerCase().includes(q));
        }
      },
      methods: {
        goTo(url) { window.location.href = url; },
        goDetail(id) { window.location.href = `detail-intern.html?intern=${encodeURIComponent(id)}`; },
        goEvaluate(id) { window.location.href = `evaluasi-intern.html?candidate=${encodeURIComponent(id)}`; },
        getStatusBadge(s) { return SIMAG_DATA.statusBadge(s); },
        getStatusLabel(s) { return SIMAG_DATA.statusLabel(s); },
        getSks(studentId) { return this.sksConversions.find(s => s.studentId === studentId) || { sks: 0, status: 'Pending' }; },
        getLatestLogbook(internId) {
          return this.logbooks.filter(l => l.internId === internId)
            .sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')))[0];
        },
        async loadData() {
          try {
            const data = await SIMAG_DATA.getDashboardSummaryMitra().catch(() => ({
              interns: [], logbooks: [], vacancies: [], applicants: [], sksConversions: []
            }));
            
            const interns = data.interns || [];
            const logbooks = data.logbooks || [];
            const vacancies = data.vacancies || [];
            const applicants = data.applicants || [];
            const sksConversions = data.sksConversions || [];

            const pending = logbooks.filter(l => ['submitted', 'pending', 'revision'].includes((l.status || '').toLowerCase()));
            const active = vacancies.filter(v => v.status === 'active');
            const avgProg = interns.length ? Math.round(interns.reduce((t, i) => t + i.progress, 0) / interns.length) : 0;

            this.interns = interns; this.logbooks = logbooks; this.sksConversions = sksConversions;
            this.stats = {
              internCount: interns.length, pendingLogbooks: pending.length,
              activeVacancies: active.length, applicantCount: applicants.length,
              averageProgress: avgProg
            };
          } catch (e) {
            console.error("Gagal memuat data:", e);
            // Fallback safe values are already populated by .catch(() => [])
          } finally {
            this.loading = false;
          }
        }
      },
      async mounted() { await this.loadData(); }
    }).mount('#app');
  </script>
</body>

</html>

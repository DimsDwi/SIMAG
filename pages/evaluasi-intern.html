<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Evaluasi Intern — SIMAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .score-grid { display:grid;grid-template-columns:1fr 120px;gap:16px;align-items:center; }
    @media (max-width:768px) {
      aside { display:none; }
      main { padding:20px !important; }
      .score-grid { grid-template-columns:1fr; }
    }
  </style>
</head>
<body>
<div style="display:flex;min-height:100vh;">
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;">
    <div style="margin-bottom:28px;padding:0 8px;"><a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">◈ SIMAG</a></div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">BM</div>
      <div><p id="sidebar-name" style="font-size:12px;font-weight:600;">PT. Bank Mandiri</p><p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p></div>
    </div>
    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'">Dashboard</div>
      <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'">Intern Aktif</div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook.html'">Monitoring Logbook</div>
      <div class="sidebar-item" onclick="window.location.href='lowongan-aktif.html'">Lowongan Aktif</div>
      <div class="sidebar-item active" onclick="window.location.href='laporan-mitra.html'">Laporan</div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;"><div class="sidebar-item" onclick="simag_logout()">Keluar</div></div>
    </nav>
  </aside>

  <main style="flex:1;padding:32px;overflow-x:hidden;">
    <div style="max-width:820px;">
      <a id="back-link" href="laporan-mitra.html" style="display:inline-block;margin-bottom:20px;color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;">Kembali ke Laporan</a>
      <div style="margin-bottom:26px;">
        <h1 id="page-title" style="font-size:24px;margin-bottom:5px;">Evaluasi Akhir Intern</h1>
        <p id="candidate-meta" style="font-size:14px;color:rgba(255,255,255,0.45);"></p>
      </div>

      <form id="evaluation-form" class="glass-card" onsubmit="submitEvaluation(event)" style="padding:30px;border-radius:16px;">
        <div id="score-fields" style="display:flex;flex-direction:column;gap:18px;"></div>
        <div style="margin-top:22px;">
          <label for="evaluation-notes" class="form-label">Catatan Evaluasi</label>
          <textarea id="evaluation-notes" class="form-input" rows="5" required maxlength="1000" placeholder="Tuliskan catatan kinerja, kekuatan, dan area pengembangan..." style="resize:vertical;"></textarea>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;gap:20px;margin-top:24px;padding:18px;border-radius:12px;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.15);">
          <div><p style="font-size:12px;color:rgba(255,255,255,0.45);">Nilai Akhir</p><p style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px;">Rata-rata seluruh aspek</p></div>
          <strong id="final-score" style="font-family:'Syne',sans-serif;font-size:30px;color:#4ade80;">0</strong>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:24px;">
          <button type="button" onclick="goBackToEvaluationList()" class="btn-outline" style="padding:10px 20px;border-radius:8px;color:#fff;">Batal</button>
          <button type="submit" class="btn-primary" style="padding:10px 22px;border-radius:8px;color:#fff;font-weight:600;">Simpan Evaluasi</button>
        </div>
      </form>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/mitra-data.js"></script>
<script>
  simag_requireAuth(['mitra', 'dospem']);
  const session = simag_getSession();
  const params = new URLSearchParams(window.location.search);
  const pageRole = params.get('role') || session.role;

  function goBackToEvaluationList() {
    window.location.href = pageRole === 'dospem' ? 'penilaian-dospem.html' : 'laporan-mitra.html';
  }

  function renderRoleShell() {
    const data = SIMAG_DATA.getData();
    const aside = document.querySelector('aside');
    if (pageRole === 'dospem') {
      aside.innerHTML = `
        <div style="margin-bottom:28px;padding:0 8px;"><a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">SIMAG</a></div>
        <div style="display:flex;align-items:center;gap:10px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
          <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#d946ef);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;">${simag_escapeHtml(data.people.lecturer.initials || 'DP')}</div>
          <div><p style="font-size:12px;font-weight:600;">${simag_escapeHtml(data.people.lecturer.name)}</p><p style="font-size:11px;color:rgba(255,255,255,0.4);">Dosen Pembimbing</p></div>
        </div>
        <nav>
          <div class="sidebar-item" onclick="window.location.href='dashboard-dospem.html'">Dashboard</div>
          <div class="sidebar-item" onclick="window.location.href='mahasiswa-bimbingan.html'">Mahasiswa Bimbingan</div>
          <div class="sidebar-item" onclick="window.location.href='review-logbook-dospem.html'">Review Logbook</div>
          <div class="sidebar-item active" onclick="window.location.href='penilaian-dospem.html'">Penilaian &amp; Evaluasi</div>
          <div class="sidebar-item" onclick="window.location.href='jadwal-dospem.html'">Jadwal Bimbingan</div>
          <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;"><div class="sidebar-item" onclick="window.location.href='profil-dospem.html'">Pengaturan</div><div class="sidebar-item" onclick="simag_logout()">Keluar</div></div>
        </nav>
      `;
      document.getElementById('back-link').href = 'penilaian-dospem.html';
      document.getElementById('back-link').textContent = 'Kembali ke Penilaian Dosen';
      document.getElementById('page-title').textContent = 'Penilaian Akhir Mahasiswa';
      document.title = 'Penilaian Dosen - SIMAG';
      return;
    }

    const activeCompany = data.people.company;
    document.getElementById('sidebar-name').textContent = activeCompany.shortName || activeCompany.name;
  }

  renderRoleShell();

  const criteria = [
    ['technical', 'Kompetensi Teknis', 'Penguasaan keterampilan sesuai posisi magang.'],
    ['communication', 'Komunikasi', 'Kemampuan menyampaikan informasi dan menerima masukan.'],
    ['discipline', 'Disiplin & Kehadiran', 'Ketepatan waktu dan kepatuhan terhadap aturan.'],
    ['teamwork', 'Teamwork', 'Kontribusi serta kolaborasi dengan anggota tim.']
  ];
  const defaultScores = {
    technical: 90,
    communication: 88,
    discipline: 95,
    teamwork: 92
  };
  const candidateId = params.get('candidate');
  const candidate = SIMAG_MITRA.getEvaluationCandidates().find((item) => item.id === candidateId)
    || SIMAG_MITRA.getEvaluationCandidates()[0];
  const existingEvaluation = SIMAG_MITRA.getEvaluation(candidate.id);
  document.getElementById('candidate-meta').textContent = `${candidate.name} • ${candidate.position} • ${candidate.period}`;

  const scoreFields = document.getElementById('score-fields');
  criteria.forEach(([id, label, description]) => {
    const wrapper = document.createElement('div');
    wrapper.className = 'score-grid';
    wrapper.innerHTML = `
      <label for="score-${id}"><strong style="display:block;font-size:14px;">${label}</strong><span style="display:block;font-size:12px;color:rgba(255,255,255,0.4);margin-top:4px;">${description}</span></label>
      <input id="score-${id}" data-score-field="${id}" type="number" min="0" max="100" required class="form-input" value="${existingEvaluation ? existingEvaluation.scores[id] : defaultScores[id]}" placeholder="0-100">
    `;
    scoreFields.appendChild(wrapper);
  });

  if (existingEvaluation) {
    document.getElementById('evaluation-notes').value = existingEvaluation.notes;
  } else {
    document.getElementById('evaluation-notes').value = 'Kinerja teknis kuat, komunikasi baik, disiplin sangat konsisten, dan mampu bekerja sama dalam tim.';
  }

  function updateFinalScore() {
    const values = [...document.querySelectorAll('[data-score-field]')]
      .map((input) => Number(input.value))
      .filter((value) => Number.isFinite(value));
    const finalScore = values.length === criteria.length
      ? Math.round(values.reduce((total, value) => total + value, 0) / values.length)
      : 0;
    document.getElementById('final-score').textContent = finalScore;
    return finalScore;
  }

  document.querySelectorAll('[data-score-field]').forEach((input) => {
    input.addEventListener('input', updateFinalScore);
  });
  updateFinalScore();

  function submitEvaluation(event) {
    event.preventDefault();
    const scores = {};
    document.querySelectorAll('[data-score-field]').forEach((input) => {
      scores[input.dataset.scoreField] = Number(input.value);
    });
    const finalScore = updateFinalScore();
    SIMAG_MITRA.saveEvaluation({
      candidateId: candidate.id,
      scores,
      finalScore,
      notes: document.getElementById('evaluation-notes').value.trim()
    });
    window.location.href = pageRole === 'dospem' ? 'penilaian-dospem.html?evaluated=1' : 'laporan-mitra.html?evaluated=1';
  }
</script>
</body>
</html>

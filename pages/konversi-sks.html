<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konversi SKS - SIMAG</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css" />
</head>
<body>
<div style="display:flex;min-height:100vh;">
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">SIMAG</a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(251,191,36,0.08);border:1px solid rgba(251,191,36,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#f59e0b,#ef4444);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;">AP</div>
      <div style="overflow:hidden;">
        <p id="sidebar-name" style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Admin Prodi FIKOM</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Admin Prodi</p>
      </div>
    </div>
    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-admin.html'" style="cursor:pointer;">Dashboard</div>
      <div class="sidebar-item" onclick="window.location.href='approval-pendaftaran.html'" style="cursor:pointer;">Approve Pendaftaran</div>
      <div class="sidebar-item active" onclick="window.location.href='konversi-sks.html'" style="cursor:pointer;">Konversi SKS</div>
      <div class="sidebar-item" onclick="window.location.href='laporan-admin.html'" style="cursor:pointer;">Analitik & Laporan</div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-admin.html'" style="cursor:pointer;">Pengaturan</div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">Keluar</div>
      </div>
    </nav>
  </aside>

  <main style="flex:1;padding:32px;overflow-x:hidden;">
    <div style="display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap;">
      <div>
        <a href="dashboard-admin.html" style="display:inline-block;margin-bottom:12px;color:rgba(255,255,255,0.45);font-size:13px;text-decoration:none;">Kembali ke dashboard</a>
        <h1 style="font-size:24px;font-weight:700;margin-bottom:6px;">Konversi SKS Magang</h1>
        <p style="font-size:14px;color:rgba(255,255,255,0.45);">Konversi SKS admin akan tampil pada dashboard Mahasiswa, Dosen, dan Mitra.</p>
      </div>
      <span id="sks-summary" class="badge badge-success">0 SKS</span>
    </div>

    <div class="glass-card" style="padding:24px;border-radius:14px;">
      <div style="overflow-x:auto;">
        <table style="width:100%;min-width:760px;border-collapse:collapse;text-align:left;">
          <thead>
            <tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Mahasiswa</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Perusahaan</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Progress</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">SKS</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Status</th>
              <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Aksi</th>
            </tr>
          </thead>
          <tbody id="sks-body"></tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/mitra-data.js"></script>
<script>
  simag_requireAuth('adminprodi');

  function renderSks() {
    const data = SIMAG_DATA.getData();
    const conversions = data.sksConversions;
    const total = conversions.reduce((sum, item) => sum + Number(item.sks || 0), 0);
    const body = document.getElementById('sks-body');
    document.getElementById('sidebar-name').textContent = data.people.admin.name;
    document.getElementById('sks-summary').textContent = `${total} SKS terkonversi`;
    body.innerHTML = '';

    data.interns.forEach((intern) => {
      const conversion = conversions.find((item) => item.studentId === intern.id) || { sks: 0, target: 20, status: 'Pending' };
      const row = document.createElement('tr');
      row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
      row.innerHTML = `
        <td style="padding:12px;">
          <strong style="display:block;font-size:13px;">${simag_escapeHtml(intern.name)}</strong>
          <span style="font-size:11px;color:rgba(255,255,255,0.4);">${simag_escapeHtml(intern.studyProgram)}</span>
        </td>
        <td style="padding:12px;font-size:13px;">${simag_escapeHtml(intern.company)}</td>
        <td style="padding:12px;font-size:13px;">${intern.progress}%</td>
        <td style="padding:12px;font-weight:700;color:#22d3ee;">${conversion.sks}/${conversion.target}</td>
        <td style="padding:12px;"><span class="badge ${conversion.status === 'Completed' ? 'badge-success' : 'badge-warning'}">${simag_escapeHtml(conversion.status)}</span></td>
        <td style="padding:12px;"></td>
      `;
      const actionCell = row.lastElementChild;
      const button = document.createElement('button');
      button.type = 'button';
      button.textContent = 'Konversi 20 SKS';
      button.className = 'btn-primary';
      button.style.cssText = 'padding:7px 14px;border-radius:8px;color:#fff;font-size:12px;font-weight:600;';
      button.onclick = () => {
        SIMAG_DATA.convertSks(intern.id, 20);
        renderSks();
      };
      actionCell.appendChild(button);
      body.appendChild(row);
    });
  }

  renderSks();
</script>
</body>
</html>

  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->

    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" class="brand-font" style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span style="color:#818cf8">.</span></a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.2);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"><span class="simag-user-initials"></span></div>
      <div style="overflow:hidden;">
        <p style="font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name"><span class="simag-user-name"></span></p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Mahasiswa • S1 IF</p>
      </div>
    </div>
    <nav>
      <p style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">Menu</p>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mahasiswa.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='cari-lowongan.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Cari Lowongan
      </div>
      <div class="sidebar-item" onclick="window.location.href='logbook-saya.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Logbook Saya
      </div>
      <div class="sidebar-item" onclick="window.location.href='progress-sks.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Progress SKS
      </div>
      <div class="sidebar-item" onclick="window.location.href='jadwal.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2h-19A1.5 1.5 0 0 0 1 3.5v17A1.5 1.5 0 0 0 2.5 22h19a1.5 1.5 0 0 0 1.5-1.5v-17A1.5 1.5 0 0 0 21.5 2zM1 8h22"/></svg>
        Jadwal
      </div>
      <div class="sidebar-item" onclick="window.location.href='notifikasi.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 17H2a3 3 0 0 0 3-3V9a7 7 0 0 1 14 0v5a3 3 0 0 0 3 3zm-8.27 4a2 2 0 0 1-3.46 0"/></svg>
        Notifikasi
      </div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          Profil
        </div>
        <div class="sidebar-item active" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Ganti Password
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main Content -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>

    <div style="margin-bottom:32px;">
      <h1 class="brand-font" style="font-size:28px;font-weight:700;margin-bottom:8px;">Ganti Password</h1>
      <p style="font-size:14px;color:rgba(255,255,255,0.45);">Ubah password Anda untuk menjaga keamanan akun.</p>
    </div>

    <div class="glass-card" style="padding:32px;border-radius:12px;max-width:500px;">
      <form @submit.prevent="handleChangePassword" v-if="!successState">
        <div style="margin-bottom:20px;">
          <label style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);display:block;margin-bottom:8px;">Password Lama</label>
          <input type="password" v-model="currentPassword" class="simag-input" placeholder="Masukkan password saat ini" style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 16px;border-radius:10px;box-sizing:border-box;" />
        </div>

        <div style="margin-bottom:20px;">
          <label style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);display:block;margin-bottom:8px;">Password Baru</label>
          <input type="password" v-model="newPassword" class="simag-input" placeholder="Minimal 6 karakter" style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 16px;border-radius:10px;box-sizing:border-box;" />
        </div>

        <div style="margin-bottom:24px;">
          <label style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.7);display:block;margin-bottom:8px;">Konfirmasi Password Baru</label>
          <input type="password" v-model="confirmPassword" class="simag-input" placeholder="Ulangi password baru" style="width:100%;background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.1);color:#fff;padding:12px 16px;border-radius:10px;box-sizing:border-box;" />
        </div>

        <p v-if="formError" style="color:#ef4444;font-size:13px;margin-bottom:16px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);padding:10px 14px;border-radius:8px;">⚠️ {{ formError }}</p>

        <button type="submit" :disabled="loading" style="width:100%;background:linear-gradient(135deg, #6366f1, #8b5cf6);color:#fff;border:none;padding:14px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;opacity:1;" :style="{opacity: loading ? 0.7 : 1}">
          {{ loading ? 'Menyimpan...' : 'Simpan Password' }}
        </button>
      </form>

      <div v-else style="text-align:center;padding:20px 0;">
        <div style="width:60px;height:60px;background:#4ade80;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
          <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <h3 class="brand-font" style="font-size:22px;margin-bottom:8px;">Berhasil!</h3>
        <p style="color:rgba(255,255,255,0.7);margin-bottom:24px;">Password Anda telah berhasil diubah.</p>
        <div style="display:flex;gap:12px;justify-content:center;">
          <button @click="successState = false; currentPassword = ''; newPassword = ''; confirmPassword = '';" style="background:transparent;border:1px solid rgba(255,255,255,0.2);color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;">Ganti Lagi</button>
          <button onclick="window.location.href='dashboard-mahasiswa.html'" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:600;">Ke Dashboard</button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth();
const { createApp } = Vue;

createApp({
  data() {
    return {
      currentPassword: '',
      newPassword: '',
      confirmPassword: '',
      loading: false,
      formError: '',
      successState: false
    };
  },
  methods: {
    async handleChangePassword() {
      this.formError = '';
      if (!this.currentPassword || !this.newPassword || !this.confirmPassword) {
        this.formError = 'Semua field harus diisi.';
        return;
      }
      if (this.newPassword.length < 6) {
        this.formError = 'Password baru minimal 6 karakter.';
        return;
      }
      if (this.newPassword !== this.confirmPassword) {
        this.formError = 'Konfirmasi password tidak cocok.';
        return;
      }

      this.loading = true;
      try {
        const session = simag_getSession();
        const res = await fetch('http://localhost:3000/api/auth/change-password', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + (session ? session.token : '')
          },
          body: JSON.stringify({
            current_password: this.currentPassword,
            new_password: this.newPassword,
            confirm_password: this.confirmPassword
          })
        });

        const data = await res.json();
        if (data.success) {
          this.successState = true;
        } else {
          this.formError = data.message || 'Gagal mengubah password.';
        }
      } catch (err) {
        this.formError = 'Error koneksi: ' + err.message;
      } finally {
        this.loading = false;
      }
    }
  },
  mounted() {
    if (typeof simag_updateSidebarName === 'function') simag_updateSidebarName();
  }
}).mount('#app');
</script>
</body>
</html>

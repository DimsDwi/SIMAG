<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Dosen Pembimbing — SIMAG</title>
  <!-- Modern Fonts for Premium Aesthetics -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../shared/styles.css?v=1782406323801" />
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>[v-cloak] { display: none !important; }</style>
</head>
<body>

<div class="bg-orb orb-1"></div>
<div class="bg-orb orb-2"></div>
<div class="bg-orb orb-3"></div>

<div class="simag-layout-wrapper" style="display:flex;min-height:100vh;">
  <button class="simag-mobile-menu-button" onclick="document.getElementById('simag-sidebar').classList.add('open'); document.getElementById('simag-overlay').classList.add('open')">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div id="simag-overlay" class="simag-mobile-overlay" onclick="document.getElementById('simag-sidebar').classList.remove('open'); document.getElementById('simag-overlay').classList.remove('open')"></div>

  <!-- Sidebar -->
  <aside id="simag-sidebar" style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;">
    <div style="margin-bottom:28px;padding:0 8px;">
      <a href="../index.html" class="brand-font" style="font-size:22px;font-weight:800;color:#fff;text-decoration:none;">SIMAG<span style="color:#818cf8">.</span></a>
    </div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(168,85,247,0.08);border:1px solid rgba(168,85,247,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div id="sidebar-initials" style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#a855f7,#d946ef);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;"><span class="simag-user-initials"></span></div>
      <div style="overflow:hidden;">
        <p style="font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="sidebar-name"><span class="simag-user-name"></span></p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Dosen Pembimbing</p>
      </div>
    </div>
    <nav>
      <p style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.25);letter-spacing:1px;text-transform:uppercase;padding:0 16px;margin-bottom:8px;">Menu</p>
      <div class="sidebar-item active" onclick="window.location.href='dashboard-dospem.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="sidebar-item" onclick="window.location.href='mahasiswa-bimbingan.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Mahasiswa Bimbingan
      </div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook-dospem.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Review Logbook
        <span id="dospem-review-badge" class="badge badge-warning" style="margin-left:auto;"><span class="simag-badge-value" data-key="reviewLogbooks"></span></span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='penilaian-dospem.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Penilaian &amp; Evaluasi
        <span id="dospem-evaluation-badge" class="badge badge-info" style="margin-left:auto;"><span class="simag-badge-value" data-key="waitingEvaluations"></span></span>
      </div>
      <div class="sidebar-item" onclick="window.location.href='jadwal-dospem.html'" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Jadwal Bimbingan
      </div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;">
        <div class="sidebar-item" onclick="window.location.href='profil-dospem.html'" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>
          Pengaturan
        </div>
        <div class="sidebar-item" onclick="simag_logout()" style="cursor:pointer;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Keluar
        </div>
      </div>
    </nav>
  </aside>

  <!-- Main -->
  <main id="app" style="flex:1;padding:32px;overflow-x:hidden;" v-cloak>
    <!-- Loading State -->
    <div v-if="loading" class="simag-loading-screen" style="display:flex;align-items:center;justify-content:center;height:60vh;flex-direction:column;gap:16px;">
      <div style="width:40px;height:40px;border-radius:50%;border:3px solid rgba(99,102,241,0.2);border-top-color:#818cf8;animation:spin 0.8s linear infinite;"></div>
      <p style="color:rgba(255,255,255,0.4);font-size:14px;">Memuat dashboard...</p>
    </div>

    <template v-else>
    <!-- Header -->
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap;">
      <div>
        <h1 class="brand-font" style="font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-0.5px;background:linear-gradient(135deg,#a5b4fc 0%,#c084fc 50%,#38bdf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Panel Dosen Pembimbing</h1>
        <p style="font-size:13px;color:rgba(255,255,255,0.4);display:flex;align-items:center;gap:6px;">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="opacity:0.6"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
          Fakultas Ilmu Komputer — Semester Genap 2024/2025
        </p>
      </div>
      <button type="button" onclick="window.location.href='jadwal-dospem.html'" class="btn-primary" style="padding:11px 22px;border-radius:10px;font-size:13px;color:#fff;font-weight:600;display:flex;align-items:center;gap:8px;white-space:nowrap;">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Buat Jadwal Bimbingan
      </button>
    </div>

    <!-- Alert -->
    <div style="background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.22);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:28px;">
      <div style="width:42px;height:42px;border-radius:50%;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="18" height="18" fill="none" stroke="#fbbf24" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
      </div>
      <div style="flex:1;min-width:0;">
        <p style="font-size:14px;font-weight:600;color:#fbbf24;margin-bottom:3px;">
          <span v-show="loading" class="simag-skeleton" style="width:220px;height:16px;display:inline-block;"></span>
          <span v-show="!loading">{{ reviewLogbooks.length }} Logbook Menunggu Review</span>
        </p>
        <p style="font-size:12px;color:rgba(255,255,255,0.5);">
          <span v-show="loading" class="simag-skeleton" style="width:320px;height:13px;display:inline-block;"></span>
          <span v-show="!loading">{{ alertCopy }}</span>
        </p>
      </div>
      <button v-show="reviewLogbooks.length > 0" onclick="window.location.href='review-logbook-dospem.html'" class="btn-primary" style="padding:9px 16px;border-radius:9px;font-size:12px;color:#fff;font-weight:600;flex-shrink:0;white-space:nowrap;">Review Sekarang</button>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;" class="dashboard-stats">
      <!-- Card 1: Mahasiswa Bimbingan -->
      <div class="glass-card" style="border-radius:14px;padding:20px;position:relative;overflow:hidden;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
          <p style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.04em;text-transform:uppercase;">Mahasiswa Bimbingan</p>
          <div style="width:34px;height:34px;border-radius:9px;background:rgba(168,85,247,0.15);border:1px solid rgba(168,85,247,0.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="16" height="16" fill="none" stroke="#a855f7" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          </div>
        </div>
        <div v-show="loading" class="simag-skeleton" style="width:56px;height:36px;margin-bottom:6px;"></div>
        <p v-show="!loading" style="font-size:32px;font-weight:800;color:#a855f7;line-height:1;margin-bottom:6px;">{{ interns.length }}</p>
        <p style="font-size:11px;color:#4ade80;display:flex;align-items:center;gap:4px;">
          <svg width="10" height="10" fill="#4ade80" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/></svg>
          Semua aktif magang
        </p>
      </div>
      <!-- Card 2: Menunggu Penilaian -->
      <div class="glass-card" style="border-radius:14px;padding:20px;position:relative;overflow:hidden;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
          <p style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.04em;text-transform:uppercase;">Menunggu Penilaian</p>
          <div style="width:34px;height:34px;border-radius:9px;background:rgba(34,211,238,0.12);border:1px solid rgba(34,211,238,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="16" height="16" fill="none" stroke="#22d3ee" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
        </div>
        <div v-show="loading" class="simag-skeleton" style="width:56px;height:36px;margin-bottom:6px;"></div>
        <p v-show="!loading" style="font-size:32px;font-weight:800;color:#22d3ee;line-height:1;margin-bottom:6px;">{{ waitingEvaluations }}</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Siap konversi nilai</p>
      </div>
      <!-- Card 3: Logbook Pending -->
      <div class="glass-card" style="border-radius:14px;padding:20px;position:relative;overflow:hidden;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
          <p style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.04em;text-transform:uppercase;">Logbook Pending</p>
          <div style="width:34px;height:34px;border-radius:9px;background:rgba(251,191,36,0.12);border:1px solid rgba(251,191,36,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="16" height="16" fill="none" stroke="#fbbf24" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
        </div>
        <div v-show="loading" class="simag-skeleton" style="width:56px;height:36px;margin-bottom:6px;"></div>
        <p v-show="!loading" style="font-size:32px;font-weight:800;color:#fbbf24;line-height:1;margin-bottom:6px;">{{ reviewLogbooks.length }}</p>
        <p style="font-size:11px;color:rgba(255,255,255,0.4);">Perlu segera direview</p>
      </div>
      <!-- Card 4: Rata-rata Progress -->
      <div class="glass-card" style="border-radius:14px;padding:20px;position:relative;overflow:hidden;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
          <p style="font-size:11px;font-weight:600;color:rgba(255,255,255,0.45);letter-spacing:0.04em;text-transform:uppercase;">Rata-rata Progress</p>
          <div style="width:34px;height:34px;border-radius:9px;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.22);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="16" height="16" fill="none" stroke="#4ade80" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          </div>
        </div>
        <div v-show="loading" class="simag-skeleton" style="width:72px;height:36px;margin-bottom:6px;"></div>
        <p v-show="!loading" style="font-size:32px;font-weight:800;color:#4ade80;line-height:1;margin-bottom:10px;">{{ averageProgress }}%</p>
        <div v-show="loading" class="simag-skeleton" style="width:100%;height:6px;border-radius:3px;"></div>
        <div v-show="!loading" style="background:rgba(255,255,255,0.08);border-radius:99px;height:6px;overflow:hidden;">
          <div :style="{ width: averageProgress + '%', background: 'linear-gradient(90deg,#4ade80,#22d3ee)', borderRadius:'99px', height:'100%', transition:'width 0.8s ease' }"></div>
        </div>
      </div>
    </div>

    <!-- Cards -->
    <div class="dashboard-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
      <!-- Student List -->
      <div class="glass-card" style="border-radius:16px;padding:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <div>
            <h3 style="font-size:15px;font-weight:700;margin-bottom:2px;">Mahasiswa Bimbingan</h3>
            <p style="font-size:11px;color:rgba(255,255,255,0.35);">Progress & status magang</p>
          </div>
          <button onclick="window.location.href='review-logbook-dospem.html'" style="font-size:11px;color:#a855f7;background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.2);border-radius:7px;padding:6px 12px;cursor:pointer;font-weight:500;">Lihat Review →</button>
        </div>
        <div v-if="!interns.length" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px 20px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:12px;color:rgba(255,255,255,0.4);">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:0.4"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
          <p style="font-size:13px;">Belum ada mahasiswa bimbingan.</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div v-for="intern in interns" :key="intern.id" style="display:flex;align-items:center;gap:12px;padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;transition:background 0.2s;" onmouseover="this.style.background='rgba(255,255,255,0.055)'" onmouseout="this.style.background='rgba(255,255,255,0.03)'">
            <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#22d3ee);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:0.5px;">{{ intern.initials }}</div>
            <div style="flex:1;min-width:0;">
              <p style="font-size:13px;font-weight:600;margin-bottom:2px;">{{ intern.name }}</p>
              <p style="font-size:11px;color:rgba(255,255,255,0.38);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ intern.company?.name || intern.company || '-' }}</p>
              <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                <div style="flex:1;background:rgba(255,255,255,0.08);border-radius:99px;height:4px;overflow:hidden;">
                  <div :style="{ width: intern.progress + '%', background: 'linear-gradient(90deg,#6366f1,#22d3ee)', height:'100%', borderRadius:'99px' }"></div>
                </div>
                <span style="font-size:11px;font-weight:700;color:#4ade80;flex-shrink:0;">{{ intern.progress }}%</span>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;">
              <span class="badge" :class="getStatusBadge(intern.status)" style="font-size:10px;">{{ intern.status }}</span>
              <div style="display:flex;gap:6px;">
                <button @click="goDetail(intern.id)" class="btn-outline" style="padding:5px 10px;border-radius:7px;color:rgba(255,255,255,0.8);font-size:11px;cursor:pointer;">Detail</button>
                <button @click="goReview(intern)" class="btn-primary" style="padding:5px 10px;border-radius:7px;color:#fff;font-size:11px;cursor:pointer;">Review</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Logbook Review -->
      <div class="glass-card" style="border-radius:16px;padding:24px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;">
          <div>
            <h3 style="font-size:15px;font-weight:700;margin-bottom:2px;">Logbook Menunggu Review</h3>
            <p style="font-size:11px;color:rgba(255,255,255,0.35);">Klik untuk melihat dan menilai</p>
          </div>
          <span v-if="reviewLogbooks.length" style="background:rgba(251,191,36,0.15);border:1px solid rgba(251,191,36,0.25);color:#fbbf24;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;">{{ reviewLogbooks.length }} Pending</span>
        </div>
        <div v-if="!reviewLogbooks.length" style="display:flex;flex-direction:column;align-items:center;gap:10px;padding:40px 20px;background:rgba(255,255,255,0.02);border:1px dashed rgba(255,255,255,0.08);border-radius:12px;color:rgba(255,255,255,0.4);">
          <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="opacity:0.4"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
          <p style="font-size:13px;">Semua logbook sudah direview. ✓</p>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div v-for="lb in reviewLogbooks" :key="lb.id" style="padding:14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:12px;border-left:3px solid #fbbf24;">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;">
              <div style="flex:1;min-width:0;">
                <p style="font-size:13px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ lb.title }}</p>
                <p style="font-size:11px;color:rgba(255,255,255,0.38);">{{ getInternName(lb.internId) }} · {{ formatDate(lb.date) }}</p>
              </div>
              <span class="badge" :class="getStatusBadge(lb.status)" style="font-size:10px;flex-shrink:0;">{{ getStatusLabel(lb.status) }}</span>
            </div>
            <div style="display:flex;gap:7px;">
              <button @click="goLogbookDetail(lb.id)" style="padding:6px 0;border-radius:8px;background:rgba(129,140,248,0.12);border:1px solid rgba(129,140,248,0.25);color:#c4b5fd;font-size:11px;cursor:pointer;flex:1;font-weight:500;">Detail</button>
              <button @click="approveLogbook(lb.id)" style="padding:6px 0;border-radius:8px;background:rgba(74,222,128,0.12);border:1px solid rgba(74,222,128,0.25);color:#4ade80;font-size:11px;cursor:pointer;flex:1;font-weight:500;">Setujui ✓</button>
              <button @click="requestRevision(lb)" style="padding:6px 0;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);font-size:11px;cursor:pointer;flex:1;font-weight:500;">Revisi</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Connection Grid -->
    <div class="glass-card" style="border-radius:14px;padding:24px;margin-top:20px;min-height:220px;">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap;">
        <div>
          <h3 style="font-size:16px;font-weight:700;margin-bottom:4px;">Koneksi Data Bimbingan</h3>
          <p style="font-size:12px;color:rgba(255,255,255,0.45);">Progress, logbook, nilai, dan SKS mahasiswa tampil lintas dashboard.</p>
        </div>
        <span v-show="loading" class="simag-skeleton" style="width:150px;height:20px;"></span>
        <span class="badge badge-info">{{ syncSummary }}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px;">
        <div v-for="card in connectionCards" :key="card.role" style="padding:16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;gap:12px;">
          <div>
            <p style="font-size:12px;color:rgba(255,255,255,0.45);margin-bottom:6px;">{{ card.title }}</p>
            <strong style="font-size:22px;" :style="{ color: card.color }">{{ card.value }}</strong>
            <p style="font-size:12px;color:rgba(255,255,255,0.42);margin-top:6px;line-height:1.5;">{{ card.copy }}</p>
          </div>
          <button @click="openDashboard(card.role, card.page)" class="btn-outline" style="margin-top:auto;padding:8px 10px;border-radius:8px;color:#fff;font-size:12px;cursor:pointer;">{{ card.button }}</button>
        </div>
      </div>
    </div>
      </template>
  </main>
</div>

<style>@keyframes spin { to { transform: rotate(360deg); } }</style>
<script src="../shared/utils.js"></script>
<script src="../shared/api-client.js"></script>
<script>
'use strict';
simag_requireAuth('dospem');
const { createApp } = Vue;
createApp({
  data() {
    const { user } = simag_getSession();
    return {
      loading: true, userName: user ? user.name : '...',
      interns: [], reviewLogbooks: [], waitingEvaluations: 0, averageProgress: 0,
      sksConversions: [], connectionCards: [], syncSummary: 'Sinkron',
      alertCopy: 'Data sedang dimuat.'
    };
  },
  computed: {
    initials() { return (this.userName||'').split(' ').filter(Boolean).slice(0,2).map(p=>p[0].toUpperCase()).join('')||'DP'; }
  },
  methods: {
    formatDate(v) { try { return new Intl.DateTimeFormat('id-ID',{day:'numeric',month:'long',year:'numeric'}).format(new Date(`${v}T00:00:00`)); } catch { return v||'-'; } },
    getStatusLabel(s) { return SIMAG_DATA.statusLabel(s); },
    getStatusBadge(s) { return SIMAG_DATA.statusBadge(s); },
    getInternName(id) { return this.interns.find(i=>i.id===id)?.name||'Mahasiswa'; },
    goDetail(id) { window.location.href = `detail-intern.html?intern=${encodeURIComponent(id)}&role=dospem`; },
    goReview(intern) {
      const pending = this._allLogbooks?.find(l => l.internId === intern.id && ['submitted','pending','revision'].includes((l.status || '').toLowerCase()));
      window.location.href = pending ? `detail-logbook.html?id=${encodeURIComponent(pending.id)}&role=dospem` : `review-logbook-dospem.html?intern=${encodeURIComponent(intern.id)}`;
    },
    goLogbookDetail(id) { window.location.href = `detail-logbook.html?id=${encodeURIComponent(id)}&role=dospem`; },
    async approveLogbook(id) { await SIMAG_DATA.approveLogbook(id); await this.loadData(); },
    async requestRevision(lb) {
      const note = window.prompt('Catatan revisi untuk mahasiswa:', lb.note||'Lengkapi detail hasil implementasi.');
      if (!note) return;
      await SIMAG_DATA.requestLogbookRevision(lb.id, note);
      await this.loadData();
    },
    openDashboard(role, page) {
      const s = simag_getSession();
      if (s.token && s.role === role) { window.location.href = page; return; }
      simag_setPostLoginRedirect(role, `pages/${page}`);
      window.location.href = `../login.html?role=${encodeURIComponent(role)}`;
    },
    async loadData() {
      try {
        const data = await SIMAG_DATA.getDashboardSummaryDospem().catch(() => null);
        if (!data) return;

        this.interns = data.interns || [];
        this.reviewLogbooks = data.reviewLogbooks || [];
        this._allLogbooks = data._allLogbooks || [];
        this.waitingEvaluations = data.waitingEvaluations || 0;
        this.averageProgress = data.averageProgress || 0;
        this.sksConversions = data.sksConversions || [];
        
        const review = this.reviewLogbooks;
        const avgProg = this.averageProgress;
        
        const latestReviewTitle = review.length > 0 ? review[0].title : '';
        const latestReviewIntern = review.length > 0 ? (data.interns.find(i=>i.id===review[0].internId)?.name || 'mahasiswa') : '';

        this.alertCopy = review.length ? `Paling baru: ${latestReviewTitle} dari ${latestReviewIntern}.` : 'Semua logbook mahasiswa bimbingan sudah selesai direview.';
        this.syncSummary = `${data.internCount || 0} mahasiswa - ${review.length} logbook`;
        
        const primarySks = data.primarySks || { sks: 0, target: 20 };
        const primaryInternStats = data.primaryInternStats;

        this.connectionCards = [
          { role:'dospem', page:'mahasiswa-bimbingan.html', title:'Dosen Pembimbing', value:`${avgProg}% progress`, copy:`${review.length} logbook perlu tindak lanjut`, color:'#a855f7', button:'Lihat bimbingan' },
          { role:'mahasiswa', page:'dashboard-mahasiswa.html', title:'Mahasiswa', value:`${primarySks.sks}/${primarySks.target} SKS`, copy: primaryInternStats ? `${primaryInternStats.logbookCompleted} logbook terisi` : 'Belum ada mahasiswa aktif', color:'#818cf8', button:'Cek tampilan' },
          { role:'mitra', page:'dashboard-mitra.html', title:'Mitra', value:`${data.internCount || 0} intern`, copy:`${data.activeVacancyCount || 0} lowongan aktif`, color:'#22d3ee', button:'Cek mitra' },
          { role:'adminprodi', page:'dashboard-admin.html', title:'Admin Prodi', value:`${this.waitingEvaluations} nilai`, copy:`${data.totalSksConversions || 0} data konversi SKS`, color:'#fbbf24', button:'Cek admin' }
        ];
      } catch(e) {
        console.error("Gagal memuat data:", e);
      } finally {
        this.loading = false;
      }
    }
  },
  async mounted() { await this.loadData(); }
}).mount('#app');
</script>
</body>
</html>

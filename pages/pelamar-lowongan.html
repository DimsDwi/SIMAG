<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pelamar Lowongan — SIMAG</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/styles.css" />
  <style>
    .applicant-modal {
      position:fixed;
      inset:0;
      z-index:100;
      display:none;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:rgba(0,0,0,0.72);
      backdrop-filter:blur(6px);
    }
    .applicant-modal.open { display:flex; }
    @media (max-width:768px) {
      aside { display:none; }
      main { padding:20px !important; }
      .applicant-header { align-items:flex-start !important; flex-direction:column; }
      .applicant-controls { width:100%; flex-direction:column; }
      .applicant-controls input, .applicant-controls select { width:100% !important; }
    }
  </style>
</head>
<body>
<div style="display:flex;min-height:100vh;">
  <aside style="width:240px;background:rgba(255,255,255,0.025);border-right:1px solid rgba(255,255,255,0.06);padding:24px 16px;flex-shrink:0;position:sticky;top:0;height:100vh;">
    <div style="margin-bottom:28px;padding:0 8px;"><a href="../index.html" style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:#fff;text-decoration:none;">◈ SIMAG</a></div>
    <div style="display:flex;align-items:center;gap:10px;background:rgba(34,211,238,0.08);border:1px solid rgba(34,211,238,0.15);border-radius:10px;padding:12px;margin-bottom:24px;">
      <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#0ea5e9,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;">BM</div>
      <div><p id="sidebar-name" style="font-size:12px;font-weight:600;">PT. Bank Mandiri</p><p style="font-size:11px;color:rgba(255,255,255,0.4);">Perusahaan Mitra</p></div>
    </div>
    <nav>
      <div class="sidebar-item" onclick="window.location.href='dashboard-mitra.html'">Dashboard</div>
      <div class="sidebar-item" onclick="window.location.href='intern-aktif.html'">Intern Aktif</div>
      <div class="sidebar-item" onclick="window.location.href='review-logbook.html'">Monitoring Logbook</div>
      <div class="sidebar-item active" onclick="window.location.href='lowongan-aktif.html'">Lowongan Aktif</div>
      <div class="sidebar-item" onclick="window.location.href='laporan-mitra.html'">Laporan</div>
      <div style="margin-top:16px;border-top:1px solid rgba(255,255,255,0.06);padding-top:16px;"><div class="sidebar-item" onclick="simag_logout()">Keluar</div></div>
    </nav>
  </aside>

  <main style="flex:1;padding:32px;overflow-x:hidden;">
    <a href="lowongan-aktif.html" style="display:inline-block;margin-bottom:20px;color:rgba(255,255,255,0.5);font-size:13px;text-decoration:none;">← Kembali ke Lowongan Aktif</a>
    <div class="applicant-header" style="display:flex;align-items:end;justify-content:space-between;gap:18px;margin-bottom:26px;">
      <div>
        <h1 id="vacancy-title" style="font-size:24px;margin-bottom:5px;">Pelamar Lowongan</h1>
        <p id="vacancy-meta" style="font-size:14px;color:rgba(255,255,255,0.45);"></p>
      </div>
      <div class="applicant-controls" style="display:flex;gap:10px;">
        <input id="applicant-search" type="search" oninput="renderApplicants()" class="form-input" placeholder="Cari pelamar..." style="width:200px;padding:9px 12px;font-size:13px;">
        <select id="applicant-status" onchange="renderApplicants()" class="form-input" style="width:150px;padding:9px 12px;font-size:13px;">
          <option value="">Semua Status</option>
          <option value="Menunggu">Menunggu</option>
          <option value="Diproses">Diproses</option>
          <option value="Diterima">Diterima</option>
          <option value="Ditolak">Ditolak</option>
        </select>
      </div>
    </div>

    <div id="applicant-summary" style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:14px;"></div>
    <div class="glass-card" style="padding:20px;border-radius:14px;overflow-x:auto;">
      <table style="width:100%;min-width:760px;border-collapse:collapse;text-align:left;">
        <thead><tr style="border-bottom:1px solid rgba(255,255,255,0.1);">
          <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Pelamar</th>
          <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Program Studi</th>
          <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">IPK</th>
          <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Status</th>
          <th style="padding:12px;color:rgba(255,255,255,0.5);font-weight:500;">Aksi</th>
        </tr></thead>
        <tbody id="applicant-body"></tbody>
      </table>
    </div>
  </main>
</div>

<div id="profile-modal" class="applicant-modal" role="dialog" aria-modal="true">
  <div class="glass-card" style="width:min(500px,100%);padding:26px;border-radius:16px;background:#171725;">
    <div style="display:flex;justify-content:space-between;gap:16px;margin-bottom:20px;">
      <div><h2 id="profile-name" style="font-size:20px;"></h2><p id="profile-nim" style="font-size:13px;color:rgba(255,255,255,0.45);margin-top:4px;"></p></div>
      <button type="button" onclick="closeProfile()" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">×</button>
    </div>
    <div id="profile-details" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;"></div>
    <div id="profile-skills" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:18px;"></div>
  </div>
</div>

<script src="../shared/utils.js"></script>
<script src="../shared/mitra-data.js"></script>
<script>
  simag_requireAuth('mitra');
  const { user } = simag_getSession();
  if (user) document.getElementById('sidebar-name').textContent = user.name;

  const requestedVacancyId = new URLSearchParams(window.location.search).get('vacancy');
  const vacancy = SIMAG_MITRA.getVacancy(requestedVacancyId) || SIMAG_MITRA.getVacancies()[0];
  const vacancyId = vacancy.id;

  document.getElementById('vacancy-title').textContent = `Pelamar ${vacancy.title}`;
  document.getElementById('vacancy-meta').textContent = `${vacancy.location} • ${vacancy.workModel} • Kuota ${vacancy.quota} orang`;

  function getApplicantBadge(status) {
    if (status === 'Diterima') return 'badge-success';
    if (status === 'Ditolak') return 'badge-warning';
    return 'badge-info';
  }

  function renderApplicants() {
    const keyword = document.getElementById('applicant-search').value.trim().toLowerCase();
    const status = document.getElementById('applicant-status').value;
    const applicants = SIMAG_MITRA.getApplicants(vacancyId).filter((applicant) => {
      const matchesKeyword = `${applicant.name} ${applicant.nim} ${applicant.studyProgram}`.toLowerCase().includes(keyword);
      return matchesKeyword && (!status || applicant.status === status);
    });
    const body = document.getElementById('applicant-body');
    body.innerHTML = '';
    document.getElementById('applicant-summary').textContent = `Menampilkan ${applicants.length} pelamar`;

    if (!applicants.length) {
      body.innerHTML = '<tr><td colspan="5" style="padding:30px;text-align:center;color:rgba(255,255,255,0.4);">Pelamar tidak ditemukan.</td></tr>';
      return;
    }

    applicants.forEach((applicant) => {
      const row = document.createElement('tr');
      row.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
      row.innerHTML = `
        <td style="padding:12px;"><strong style="display:block;font-size:13px;">${applicant.name}</strong><span style="font-size:11px;color:rgba(255,255,255,0.4);">${applicant.nim}</span></td>
        <td style="padding:12px;font-size:13px;">${applicant.studyProgram} • Semester ${applicant.semester}</td>
        <td style="padding:12px;font-weight:600;color:#22d3ee;">${applicant.gpa}</td>
        <td style="padding:12px;"><span class="badge ${getApplicantBadge(applicant.status)}">${applicant.status}</span></td>
        <td style="padding:12px;"><div class="applicant-actions" style="display:flex;gap:7px;"></div></td>
      `;
      const actions = row.querySelector('.applicant-actions');
      const profileButton = createActionButton('Profil', 'rgba(255,255,255,0.08)', '#fff', () => openProfile(applicant.id));
      const acceptButton = createActionButton('Terima', 'rgba(74,222,128,0.15)', '#4ade80', () => updateApplicantStatus(applicant.id, 'Diterima'));
      const rejectButton = createActionButton('Tolak', 'rgba(248,113,113,0.12)', '#fca5a5', () => updateApplicantStatus(applicant.id, 'Ditolak'));
      actions.append(profileButton, acceptButton, rejectButton);
      body.appendChild(row);
    });
  }

  function createActionButton(label, background, color, handler) {
    const button = document.createElement('button');
    button.type = 'button';
    button.textContent = label;
    button.style.cssText = `padding:6px 10px;border-radius:6px;background:${background};border:1px solid rgba(255,255,255,0.08);color:${color};font-size:11px;cursor:pointer;`;
    button.onclick = handler;
    return button;
  }

  function updateApplicantStatus(applicantId, status) {
    if (!window.confirm(`Ubah status pelamar menjadi ${status}?`)) return;
    SIMAG_MITRA.updateApplicant(applicantId, { status });
    renderApplicants();
  }

  function openProfile(applicantId) {
    const applicant = SIMAG_MITRA.getApplicant(applicantId);
    document.getElementById('profile-name').textContent = applicant.name;
    document.getElementById('profile-nim').textContent = `${applicant.nim} • ${applicant.studyProgram}`;
    document.getElementById('profile-details').innerHTML = `
      <div style="padding:12px;border-radius:9px;background:rgba(255,255,255,0.04);"><small style="color:rgba(255,255,255,0.4);">Semester</small><strong style="display:block;margin-top:4px;">${applicant.semester}</strong></div>
      <div style="padding:12px;border-radius:9px;background:rgba(255,255,255,0.04);"><small style="color:rgba(255,255,255,0.4);">IPK</small><strong style="display:block;margin-top:4px;color:#22d3ee;">${applicant.gpa}</strong></div>
    `;
    document.getElementById('profile-skills').innerHTML = applicant.skills
      .map((skill) => `<span class="badge badge-info">${skill}</span>`)
      .join('');
    document.getElementById('profile-modal').classList.add('open');
  }

  function closeProfile() {
    document.getElementById('profile-modal').classList.remove('open');
  }

  document.getElementById('profile-modal').addEventListener('click', (event) => {
    if (event.target.id === 'profile-modal') closeProfile();
  });
  renderApplicants();
</script>
</body>
</html>
